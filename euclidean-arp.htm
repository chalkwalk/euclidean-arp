                             const notesChanged = State.releaseSustainedNotes();
                             if (notesChanged) {
                                 handleNoteChange(null, null); // Signal potential note removal
                                 UI.updatePlaybackKeyboard(); // Full update needed after sustain release
                             }
                         }
                     }
                    return; // Sustain handled
                }

                // MPE CC 74 (Y-Axis/Timbre)
                if (midiState.isMPEEnabled && ccNumber === 74) {
                     const note = midiState.mpeChannelNotes[channel];
                     if (note !== null) {
                         const originalNote = State.getOriginalNote(note);
                         if (originalNote !== null) {
                             State.get('noteMPEYAxis').set(originalNote, ccValue);
                             // console.log(`MPE Y-Axis Ch ${channel+1}, Note ${originalNote}, Value ${ccValue}`);
                         }
                     }
                 }
                 // --- Handle other CCs here ---
             };
             const handlePitchBend = (channel, lsb, msb) => {
                 const bendValue = ((msb << 7) | lsb) - 8192; // -8192 to +8191
                 if (midiState.isMPEEnabled) {
                     const note = midiState.mpeChannelNotes[channel];
                     if (note !== null) {
                         const originalNote = State.getOriginalNote(note);
                         // TODO: Store/use pitch bend value per note if needed for output
                         // console.log(`MPE Pitch Bend Ch ${channel+1}, Note ${originalNote}, Bend ${bendValue}`);
                     }
                 } else {
                     // Non-MPE: Apply bend globally or only if on base channel
                     if (channel === midiState.mpeGlobalOutputChannelNum) {
                         // TODO: Store/use global pitch bend value
                         // console.log(`Global Pitch Bend Ch ${channel+1}, Bend ${bendValue}`);
                     }
                 }
             };

            // --- Main MIDI Message Handler ---
            const onMidiMessage = (event) => {
                const command = event.data[0];
                const data1 = event.data.length > 1 ? event.data[1] : 0;
                const data2 = event.data.length > 2 ? event.data[2] : 0;

                // System Real-Time Messages
                if (command >= 0xF8) {
                    switch (command) {
                        case 0xF8: Clock.handleMidiTick(); break; // MIDI Clock
                        case 0xFA: // MIDI Start
                             // console.log("MIDI Start Received");
                             if (State.get('arpSyncMode') === 'transport') Main.transportStart();
                             break;
                        case 0xFB: // MIDI Continue
                             // console.log("MIDI Continue Received");
                             if (State.get('arpSyncMode') === 'transport') Main.transportContinue();
                             break;
                        case 0xFC: // MIDI Stop
                             // console.log("MIDI Stop Received");
                             if (State.get('arpSyncMode') === 'transport') Main.transportStop();
                             break;
                    }
                    return;
                }

                // Channel Messages
                const messageType = command & 0xF0;
                const channel = command & 0x0F; // 0-15

                // --- Channel Filtering ---
                let processChannelMessage = false;
                 if (midiState.isMPEEnabled) {
                    if (midiState.mpeGlobalInputChannelNum === -1) { // Omni
                        processChannelMessage = true;
                    } else {
                        const baseGlobal = midiState.mpeGlobalInputChannelNum;
                        const voiceCount = midiState.mpeInputVoiceChannels;
                        // Is it global channel OR a valid voice channel?
                         if (channel === baseGlobal || (channel > baseGlobal && channel <= baseGlobal + voiceCount)) {
                             processChannelMessage = true;
                         }
                    }
                } else {
                    // Non-MPE: Only process on the base output channel
                     if (channel === midiState.mpeGlobalOutputChannelNum) {
                         processChannelMessage = true;
                     }
                }

                if (!processChannelMessage) return; // Ignore message on other channels

                // --- Process Filtered Message ---
                 switch (messageType) {
                    case 0x90: handleNoteOn(channel, data1, data2); break;          // Note On
                    case 0x80: handleNoteOff(channel, data1, data2); break;         // Note Off
                    case 0xA0: handlePolyAftertouch(channel, data1, data2); break;  // Polyphonic Aftertouch
                    case 0xB0: handleControlChange(channel, data1, data2); break;   // Control Change
                    case 0xD0: handleChannelPressure(channel, data1); break;       // Channel Pressure
                    case 0xE0: handlePitchBend(channel, data1, data2); break;       // Pitch Bend
                     // case 0xC0: // Program Change
                     // case 0xF0: // System Common (System Exclusive handled separately if needed)
                     //     break;
                }
            };

            // Called after a note is added/removed to trigger state updates
            const handleNoteChange = (addedNote, removedNote) => {
                // 1. Update Octave Expanded Notes
                State.updateOctaveExpandedNotes();

                // 2. Update Shuffle Orders (Needs info about specific note changes)
                State.updateShuffleOrdersOnNoteChange(addedNote, removedNote);

                // 3. Update Mode Note List & Adjust Index for continuity
                const oldModeNoteList = [...State.get('currentModeNoteList')]; // Copy before update
                const oldIndex = State.get('currentNoteIndex');
                const newModeNoteList = ArpModes.updateModeNoteList(); // Generate new list

                if (oldModeNoteList.length > 0 && newModeNoteList.length > 0 && State.get('isRunning')) {
                    const newIndex = ArpModes.findContinuationIndex(oldModeNoteList, newModeNoteList, oldIndex);
                    State.setCurrentNoteIndex(newIndex);
                } else if (newModeNoteList.length === 0) {
                     State.setCurrentNoteIndex(0); // Reset index if list becomes empty
                }
                // If arp wasn't running, index reset happens in start/stop logic

                // 4. Update Playback Keyboard UI (full update better after note changes)
                UI.updatePlaybackKeyboard();

                // 5. Handle Arp Start/Stop for Key Sync
                 if (State.get('arpSyncMode') === 'key') {
                    const totalHeldNotes = State.get('heldNotesUI').size + State.get('heldNotesMIDI').size;
                     if (totalHeldNotes > 0 && !State.get('isRunning')) {
                         Main.startArpeggiator();
                     } else if (totalHeldNotes === 0 && State.get('isRunning')) {
                         Main.stopArpeggiator();
                     }
                 }
            };


            // --- Public Methods ---
            return {
                 init: async () => {
                    try {
                        midiAccess = await navigator.requestMIDIAccess();
                        UI.updateMidiStatus("MIDI Access Granted. Select devices.");
                        UI.populateMidiDeviceLists(midiAccess.inputs, midiAccess.outputs);
                    } catch (e) {
                         UI.updateMidiStatus(`MIDI Access Failed: ${e.message}`);
                        console.error("MIDI Access Failed:", e);
                    }
                },
                 updateSettings: updateMidiSettings,
                 selectInputDevice: (deviceId) => {
                    if (inputDevice) {
                        inputDevice.onmidimessage = null;
                        inputDevice.close?.(); // Close if possible
                    }
                    inputDevice = deviceId ? midiAccess?.inputs.get(deviceId) : null;
                    if (inputDevice) {
                        inputDevice.onmidimessage = onMidiMessage;
                         inputDevice.open?.(); // Open if possible
                         UI.updateMidiStatus(`Input: ${inputDevice.name || 'Unknown'} | Output: ${outputDevice?.name || 'None'}`);
                    } else {
                         if (deviceId) console.warn(`MIDI Input device with ID ${deviceId} not found.`);
                         UI.updateMidiStatus(`Input: None | Output: ${outputDevice?.name || 'None'}`);
                    }
                },
                 selectOutputDevice: (deviceId) => {
                    // Output device doesn't need open/close in the same way usually
                    outputDevice = deviceId ? midiAccess?.outputs.get(deviceId) : null;
                     if (!outputDevice && deviceId) {
                         console.warn(`MIDI Output device with ID ${deviceId} not found.`);
                     }
                     UI.updateMidiStatus(`Input: ${inputDevice?.name || 'None'} | Output: ${outputDevice?.name || 'None'}`);
                },
                 isOutputSelected: () => !!outputDevice, // Added helper
                 // Triggered by UI interactions (Piano keys)
                handleUINoteOn: (note) => {
                     const added = State.addHeldNote(note, 'ui');
                     UI.updatePianoKey(note);
                     if (added) {
                        handleNoteChange(note, null);
                     } else { // UI toggle off
                        const removed = State.removeHeldNote(note, 'ui'); // Try removing if toggled off
                        if (removed) {
                            handleNoteChange(null, note);
                        }
                    }
                 },
                 // --- MIDI Output ---
                sendNoteOn: (note, velocity, channel) => {
                    if (outputDevice && note >= 0 && note <= 127 && velocity > 0 && velocity <= 127 && channel >= 0 && channel <= 15) {
                        // console.log(`MIDI OUT: Note ON ${note} Vel ${velocity} Ch ${channel + 1}`);
                        outputDevice.send([0x90 + channel, note, velocity]);
                    }
                },
                sendNoteOff: (note, velocity, channel) => {
                     if (outputDevice && note >= 0 && note <= 127 && channel >= 0 && channel <= 15) {
                        // console.log(`MIDI OUT: Note OFF ${note} Vel ${velocity} Ch ${channel + 1}`);
                        // Standard MIDI uses Note Off command
                        // MPE often uses Note On w/ vel 0, but Note Off should also work.
                        // Stick to Note Off for clarity unless specific MPE target requires vel 0.
                         outputDevice.send([0x80 + channel, note, velocity]);
                    }
                },
                 // --- MPE Channel Management ---
                 // Basic round-robin or find-free channel for MPE output (simplified)
                 getMpeOutputChannel: (note) => {
                     if (midiState.mpeOutputMode !== 'mpe') {
                        return midiState.mpeGlobalOutputChannelNum; // Use base channel for non-mpe
                    }
                     // Find existing channel for this note if already active
                     for(let i=0; i<16; ++i) {
                         // Skip global channel when searching for note's voice channel
                         if (midiState.mpeChannelNotes[i] === note && i !== midiState.mpeGlobalOutputChannelNum) return i;
                     }
                     // Find first free voice channel (skip global channel)
                     const baseChannel = midiState.mpeGlobalOutputChannelNum;
                     const voiceChannels = midiState.mpeInputVoiceChannels; // Use input setting for range
                     for (let i = 1; i <= voiceChannels; i++) { // Check channels base+1 to base+N
                        const checkChannel = (baseChannel + i) % 16; // Wrap around
                        if (checkChannel === baseChannel) continue; // Don't use global channel for voice
                        if (midiState.mpeChannelNotes[checkChannel] === null) {
                             return checkChannel;
                        }
                     }
                     // Fallback: Steal oldest/first voice channel (simple overwrite)
                      const fallbackChannel = (baseChannel + 1) % 16;
                      return fallbackChannel === baseChannel ? (baseChannel + 2) % 16 : fallbackChannel; // Ensure not global
                 },
                 assignMpeChannelNote: (channel, note) => {
                     // Assigns note to channel for tracking (input or output)
                    if (midiState.isMPEEnabled || midiState.mpeOutputMode === 'mpe') {
                         // Check if channel is a valid voice channel (relative to *output* global for output assignment)
                         const baseGlobalOut = midiState.mpeGlobalOutputChannelNum;
                         if (channel !== baseGlobalOut) { // Don't assign voices to the global channel
                            // console.log(`Assigning Note ${note} to MPE Channel ${channel + 1}`);
                            midiState.mpeChannelNotes[channel] = note;
                         }
                    }
                 },
                 clearMpeChannel: (channel, note) => {
                    // Clears tracking if note matches channel
                    if (midiState.isMPEEnabled || midiState.mpeOutputMode === 'mpe') {
                         if (midiState.mpeChannelNotes[channel] === note) {
                             // console.log(`Clearing Note ${note} from MPE Channel ${channel + 1}`);
                             midiState.mpeChannelNotes[channel] = null;
                         }
                    }
                 },
                clearMpeChannelForNote: (note) => {
                    // Clears tracking for a specific note across all channels
                    if (midiState.isMPEEnabled || midiState.mpeOutputMode === 'mpe') {
                        for(let ch=0; ch < 16; ++ch) {
                            if (midiState.mpeChannelNotes[ch] === note) {
                                midiState.mpeChannelNotes[ch] = null;
                                // console.log(`Clearing Note ${note} from MPE Channel ${ch + 1} (by note)`);
                                // Don't break; note might somehow be on multiple? (Though shouldn't)
                            }
                        }
                    }
                },
                 // Called by Playback module before sending note off
                 getMidiOutputChannelForNote: (note) => {
                     if (midiState.mpeOutputMode !== 'mpe') {
                         return midiState.mpeGlobalOutputChannelNum;
                     }
                     // Find the channel the note is currently assigned to for MPE output
                     for (let ch = 0; ch < 16; ch++) {
                         // Ensure it's not the global channel being returned as the voice channel
                         if (midiState.mpeChannelNotes[ch] === note && ch !== midiState.mpeGlobalOutputChannelNum) {
                             return ch;
                         }
                     }
                     // If somehow not found (e.g., state mismatch), fallback to global? Or first voice channel?
                     console.warn(`Could not find active MPE output voice channel for note ${note}. Using first voice channel.`);
                     const fallbackChannel = (midiState.mpeGlobalOutputChannelNum + 1) % 16;
                      return fallbackChannel === midiState.mpeGlobalOutputChannelNum ? (midiState.mpeGlobalOutputChannelNum + 2) % 16 : fallbackChannel;
                 },
                 handleNoteChange: handleNoteChange, // Expose for UI calls
                 getSetting: (key) => midiState[key] // Getter for UI sync
            };
        })();

        // --- Playback Module (Handles Note Output Logic) ---
        const Playback = (() => {

            /** @type {Map<number, {noteOffTimeoutId: number | null, isExtended: boolean, chordsHeldCount: number, timeHeldDivisions: number, outputChannel: number}>} */
            let activeNotes = new Map(); // Local reference, synced via State module access

             const calculateVelocity = (originalNote) => {
                 const baseVel = State.get('baseVelocity');
                 const maxVel = State.get('maxVelocity');
                 const pressure = State.getNotePressure(originalNote); // Pressure is 0-127
                 const pressureRatio = Math.max(0, Math.min(1, pressure / 127));
                 const velocity = baseVel + (maxVel - baseVel) * pressureRatio;
                 return Math.max(1, Math.min(127, Math.round(velocity)));
            };

            const calculateGateDurationMs = (gateMultiplier = 1) => {
                 const clockDivMs = Clock.getClockDivisionDurationMs();
                 const gatePercent = State.get('gateLengthPercentage');
                 if (clockDivMs <= 0 || gatePercent <= 0) return Config.MIN_GATE_DURATION_MS;
                 const baseDuration = (clockDivMs * gatePercent) / 100;
                 return Math.max(Config.MIN_GATE_DURATION_MS, baseDuration * gateMultiplier);
            };

            const startNote = (note, velocity, outputChannel) => {
                 activeNotes = State.getActiveArpNotes(); // Ensure map is synced before check
                 if (activeNotes.has(note)) {
                    // console.warn(`Playback: Attempted to start already active note ${note}. Cancelling existing off first.`);
                    cancelNoteOff(note); // Ensure any pending OFF is cancelled
                 }
                 Midi.sendNoteOn(note, velocity, outputChannel);
                 Midi.assignMpeChannelNote(outputChannel, note); // Track output channel usage if MPE
                 activeNotes.set(note, { // Update the map directly (it's a reference from State)
                    noteOffTimeoutId: null,
                    isExtended: false,
                    chordsHeldCount: 0,
                    timeHeldDivisions: 0,
                    outputChannel: outputChannel
                 });
                 UI.updatePlaybackKey(note);
            };

             const scheduleNoteOff = (note, delayMs, outputChannel) => {
                activeNotes = State.getActiveArpNotes(); // Ensure map is synced
                cancelNoteOff(note); // Clear existing timeout

                 const timeoutId = setTimeout(() => {
                     activeNotes = State.getActiveArpNotes(); // Re-sync map inside timeout
                    // Check if note still exists in map before stopping
                    if (activeNotes.has(note)) {
                        const currentState = activeNotes.get(note);
                        // Ensure the timeout belongs to the current state instance
                        if (currentState.noteOffTimeoutId === timeoutId) {
                            stopNote(note, currentState.outputChannel);
                        }
                    }
                 }, Math.max(0, delayMs));

                 const currentState = activeNotes.get(note);
                 if (currentState) {
                     // Update the state directly in the shared map
                     currentState.noteOffTimeoutId = timeoutId;
                     currentState.isExtended = false; // Mark as not extended when scheduling off
                     UI.updatePlaybackKey(note);
                 }
             };

             const cancelNoteOff = (note) => {
                activeNotes = State.getActiveArpNotes(); // Ensure map is synced
                const noteState = activeNotes.get(note);
                if (noteState?.noteOffTimeoutId !== null) {
                    clearTimeout(noteState.noteOffTimeoutId);
                     noteState.noteOffTimeoutId = null; // Update the shared map state
                    UI.updatePlaybackKey(note); // Visuals might depend on pending off state
                }
             };

             const stopNote = (note, outputChannel, velocity = 0) => {
                 activeNotes = State.getActiveArpNotes(); // Ensure map is synced
                 cancelNoteOff(note); // Ensure timeout is cleared
                 if (activeNotes.has(note)) {
                     // Determine correct output channel (might differ if MPE)
                     const finalOutputChannel = Midi.getMidiOutputChannelForNote(note); // Get potentially dynamic MPE channel
                     Midi.sendNoteOff(note, velocity, finalOutputChannel);
                     Midi.clearMpeChannel(finalOutputChannel, note); // Release MPE channel tracking
                     activeNotes.delete(note); // Remove from the shared map
                     UI.updatePlaybackKey(note);
                 }
             };

            // --- ChordN Gate Extension Logic ---
             const findNextPlayedChordInfo = (maxLookahead = Config.LOOKAHEAD_MAX_STEPS) => {
                const arpMode = State.get('arpMode');
                 const modeNotes = State.get('currentModeNoteList');
                if (arpMode !== 'chordN' || !modeNotes || modeNotes.length === 0) {
                    return { nextChordIndex: null, nextChordNotes: null, stepsToNextChord: 0 };
                }

                 let simRhythmIndex = State.get('currentRhythmIndex');
                 let simPatternIndex = State.get('currentPatternIndex');
                 let simChordIndex = State.get('currentNoteIndex');
                 const rhythm = Rhythm.getRhythm();
                 const pattern = Rhythm.getPatternRhythm();
                 const rhythmLen = rhythm?.length ?? 0;
                 const patternLen = pattern?.length ?? 0;
                 let steps = 0;

                for (let i = 0; i < maxLookahead; i++) {
                    steps++;

                    // Advance rhythm index for the next step
                    simRhythmIndex = (rhythmLen > 0) ? (simRhythmIndex + 1) % rhythmLen : 0;
                    const rEvent = Rhythm.getRhythmEventAt(simRhythmIndex); // Get event at the *next* index

                     if (rEvent === Config.RHYTHM_BEAT) {
                        // Advance pattern index only on a beat
                        simPatternIndex = (patternLen > 0) ? (simPatternIndex + 1) % patternLen : 0;
                         const pEvent = Rhythm.getPatternEventAt(simPatternIndex); // Get event at the *next* index

                         if (pEvent === Config.PATTERN_NOTE) {
                            // Found the next played chord step, advance chord index
                            simChordIndex = (simChordIndex + 1) % modeNotes.length;
                            return {
                                nextChordIndex: simChordIndex,
                                nextChordNotes: modeNotes[simChordIndex],
                                stepsToNextChord: steps
                            };
                        } else if (pEvent === Config.PATTERN_SKIP) {
                            // Skip advances the chord index without playing
                             simChordIndex = (simChordIndex + 1) % modeNotes.length;
                         }
                     }
                     // If RHYTHM_REST or end of loop, continue searching
                 }

                 // Lookahead limit reached
                 return { nextChordIndex: null, nextChordNotes: null, stepsToNextChord: steps };
             };


             // Main function to play notes for a step
            const playNotesForStep = (notesOrChord) => {
                 if (!Midi.isOutputSelected()) return;
                 activeNotes = State.getActiveArpNotes(); // Sync with main state map

                 const notesArray = Array.isArray(notesOrChord) ? notesOrChord : [notesOrChord];
                 if (notesArray.length === 0) return;

                 const arpMode = State.get('arpMode');
                 const isChordModeActive = arpMode === 'chord' || arpMode === 'chordN';
                 const subArpScale = State.get('subArpScalePercentage');
                 const useSubArp = isChordModeActive && notesArray.length > 1 && subArpScale > 0;

                 // --- ChordN Gate Extension Lookahead ---
                 let nextPlayedInfo = { nextChordIndex: null, nextChordNotes: null, stepsToNextChord: 0 };
                 if (arpMode === 'chordN') {
                    nextPlayedInfo = findNextPlayedChordInfo();
                 }

                 // --- Determine Gate Multiplier (Gate Flex) ---
                 const currentRhythmIdx = State.get('currentRhythmIndex');
                 const gateMultiplier = State.get('isGateFlexEnabled') ? Rhythm.getGateMultiplier(currentRhythmIdx) : 1;

                 // --- Process Each Note ---
                 if (useSubArp) {
                     // Sub-Arpeggiation Logic
                     const subArpMode = State.get('subArpMode');
                     const clockDivMs = Clock.getClockDivisionDurationMs();
                     const subArpTotalDuration = (clockDivMs * subArpScale) / 100;
                     const noteSpacingMs = notesArray.length > 1 ? subArpTotalDuration / notesArray.length : 0;

                     let subArpedNotes = Playback.generateSubArpList([...notesArray], subArpMode); // Use internal helper

                     subArpedNotes.forEach((expandedNote, index) => {
                         const originalNote = State.getOriginalNote(expandedNote);
                         if (originalNote === null) return;

                         const velocity = calculateVelocity(originalNote);
                         const delay = noteSpacingMs * index;
                         const subArpGateDurationMs = calculateGateDurationMs(1); // No flex multiplier for sub-arp; use base gate length %

                         setTimeout(() => {
                             activeNotes = State.getActiveArpNotes(); // Re-sync map inside timeout
                            // Avoid retriggering notes that are ALREADY actively extended by ChordN main logic
                             if (!activeNotes.has(expandedNote) || !activeNotes.get(expandedNote).isExtended) {
                                 const outputChannel = Midi.getMpeOutputChannel(expandedNote); // Assign channel if needed
                                 startNote(expandedNote, velocity, outputChannel);
                                 scheduleNoteOff(expandedNote, subArpGateDurationMs, outputChannel);
                             } else {
                                 // console.log(`Sub-arp skipping already extended note: ${expandedNote}`);
                             }
                         }, delay);
                     });

                 } else {
                     // Play Simultaneously (or single note)
                     notesArray.forEach(expandedNote => {
                         const originalNote = State.getOriginalNote(expandedNote);
                         if (originalNote === null) return;

                         const velocity = calculateVelocity(originalNote);
                         const noteIsActive = activeNotes.has(expandedNote);
                         const currentState = noteIsActive ? activeNotes.get(expandedNote) : null;
                         // Determine output channel: use existing if active, else get a new one
                         const outputChannel = currentState ? currentState.outputChannel : Midi.getMpeOutputChannel(expandedNote);

                         // --- ChordN Gate Extension Logic ---
                         const maxChordExt = State.get('maxChordExtension');
                         const maxTimeExt = State.get('maxTimeExtensionDivisions');
                         const isInNextChord = arpMode === 'chordN' && nextPlayedInfo.nextChordNotes?.includes(expandedNote);

                         if (noteIsActive && currentState) {
                             // --- Logic for ALREADY ACTIVE note ---
                             cancelNoteOff(expandedNote); // Essential: Cancel pending off
                             currentState.timeHeldDivisions++; // Increment time regardless

                             // Check if we CAN continue extending
                              const canContinueExtendingCount = currentState.chordsHeldCount < (maxChordExt - 1); // Count is 0-based for checks
                              const willExceedTimeLimit = (currentState.timeHeldDivisions + nextPlayedInfo.stepsToNextChord) > maxTimeExt;
                             const continueExtending = arpMode === 'chordN' && isInNextChord && canContinueExtendingCount && !willExceedTimeLimit;

                             if (continueExtending) {
                                 // Continue extending
                                 currentState.isExtended = true;
                                 currentState.chordsHeldCount++;
                                 currentState.noteOffTimeoutId = null; // Ensure no timeout
                                 // console.log(`Extended note ${expandedNote} (Chords: ${currentState.chordsHeldCount + 1}, Time: ${currentState.timeHeldDivisions})`);
                             } else {
                                 // Stop extending (or was never extended)
                                 currentState.isExtended = false;
                                 currentState.chordsHeldCount = 0; // Reset count
                                 const gateDurationMs = calculateGateDurationMs(gateMultiplier);
                                 scheduleNoteOff(expandedNote, gateDurationMs, outputChannel);
                                 // console.log(`Stopped/Not extending ${expandedNote}, scheduling off in ${gateDurationMs.toFixed(0)}ms`);
                             }
                             UI.updatePlaybackKey(expandedNote); // Update visuals

                         } else {
                             // --- Logic for NEWLY STARTED note ---
                             // Check if we SHOULD start extending
                             const canStartExtending = maxChordExt > 1;
                             const willExceedTimeLimitOnFirstStep = (nextPlayedInfo.stepsToNextChord) >= maxTimeExt; // Check if first step already exceeds
                             const startExtending = arpMode === 'chordN' && isInNextChord && canStartExtending && !willExceedTimeLimitOnFirstStep;

                             // Start the note
                             startNote(expandedNote, velocity, outputChannel);
                             const newState = activeNotes.get(expandedNote); // Get the newly created state (reference from map)

                             if (startExtending && newState) {
                                 // Start extending immediately
                                 newState.isExtended = true;
                                 newState.chordsHeldCount = 1; // First extension count
                                 newState.timeHeldDivisions = 0;
                                 newState.noteOffTimeoutId = null;
                                 // console.log(`Started extended note ${expandedNote}`);
                             } else if (newState) {
                                 // Start with normal gate
                                 newState.isExtended = false;
                                 newState.chordsHeldCount = 0;
                                 newState.timeHeldDivisions = 0;
                                 const gateDurationMs = calculateGateDurationMs(gateMultiplier);
                                 scheduleNoteOff(expandedNote, gateDurationMs, outputChannel);
                                 // console.log(`Started normal note ${expandedNote}, scheduling off in ${gateDurationMs.toFixed(0)}ms`);
                             }
                             UI.updatePlaybackKey(expandedNote); // Update visuals
                         }
                     }); // End notesArray.forEach
                 } // End else (play simultaneously)
            };

             // --- Gate Extension Time Limit Check ---
             const checkActiveNoteTimeLimits = () => {
                const notesToStop = [];
                const maxTimeExt = State.get('maxTimeExtensionDivisions');
                activeNotes = State.getActiveArpNotes(); // Ensure local map is synced

                 activeNotes.forEach((state, note) => {
                    // Only check/increment time for notes that are currently marked as extended
                     if (state.isExtended && state.noteOffTimeoutId === null) {
                         // Time division count is incremented when handling the note *during* the step (in the noteIsActive block above).
                         // Here we check if the *current* count meets/exceeds the limit.
                         if (state.timeHeldDivisions >= maxTimeExt) {
                             notesToStop.push(note);
                             // console.log(`Note ${note} time limit reached (${state.timeHeldDivisions}/${maxTimeExt}). Queuing stop.`);
                         }
                     }
                     // Reset counters if the note is active but *not* extended (it just finished extending or never started)
                     else if (!state.isExtended) {
                        state.chordsHeldCount = 0;
                        state.timeHeldDivisions = 0;
                     }
                 });

                 // Stop notes exceeding the limit *before* processing the next step's notes
                 notesToStop.forEach(note => {
                     if (activeNotes.has(note)) {
                        const state = activeNotes.get(note);
                        state.isExtended = false; // Ensure it's marked as not extended before stopping
                        stopNote(note, state.outputChannel);
                     }
                 });
             };

            return {
                playNotesForStep: playNotesForStep,
                stopAllNotes: () => {
                    activeNotes = State.getActiveArpNotes(); // Sync map
                     if (activeNotes.size > 0) {
                        // console.log("Stopping all playback notes:", Array.from(activeNotes.keys()));
                        const notes = Array.from(activeNotes.keys());
                        notes.forEach(note => {
                            const state = activeNotes.get(note); // Get state before potentially deleting
                            if(state) {
                                 stopNote(note, state.outputChannel);
                            } else {
                                // Fallback if state missing? Should not happen. Find channel differently.
                                const fallbackChannel = Midi.getMidiOutputChannelForNote(note); // Ask Midi module
                                stopNote(note, fallbackChannel);
                            }
                        });
                        // activeNotes map is cleared implicitly by stopNote calls deleting from it
                    }
                },
                checkActiveNoteTimeLimits: checkActiveNoteTimeLimits,
                // Expose sub-arp list generation for potential external use?
                generateSubArpList: (notes, mode) => {
                    let subArpedList = [...notes];
                     switch (mode) {
                         case 'up': subArpedList.sort((a, b) => a - b); break;
                         case 'down': subArpedList.sort((a, b) => b - a); break;
                         case 'random': subArpedList.sort(() => Math.random() - 0.5); break;
                         // Use ArpModes generators directly for converge/diverge
                         case 'converge': subArpedList = ArpModes.generateConvergeList(subArpedList); break; // Assumes ArpModes exposes this
                         case 'diverge': subArpedList = ArpModes.generateDivergeList(subArpedList); break; // Assumes ArpModes exposes this
                         default: subArpedList.sort((a, b) => a - b); break;
                     }
                     return subArpedList;
                }
            };
        })();


         // --- UI Module (DOM Interaction & Event Listeners) ---
        const UI = (() => {
            let elements = {}; // Cache DOM elements

             const cacheElements = () => {
                elements = {
                     // Keyboards & Displays
                    pianoKeyboard: document.getElementById('pianoKeyboard'),
                    playbackKeyboard: document.getElementById('playbackKeyboardDisplay'),
                    playbackDisplay: document.getElementById('playbackDisplay'),
                    patternDisplay: document.getElementById('patternDisplay'),
                    rhythmDisplay: document.getElementById('rhythmDisplay'),
                    // MIDI/MPE Tab
                    midiStatus: document.getElementById('midiStatus'),
                    midiInputSelect: document.getElementById('midiInputSelect'),
                    midiOutputSelect: document.getElementById('midiOutputSelect'),
                    tempoSource: document.getElementById('tempoSource'),
                    tempoBPMInput: document.getElementById('tempoBPMInput'),
                    tempoBPMDisplay: document.getElementById('tempoBPMDisplay'),
                    enableMPE: document.getElementById('enableMPE'),
                    mpeGlobalInputChannel: document.getElementById('mpeGlobalInputChannel'),
                    mpeInputVoiceChannels: document.getElementById('mpeInputVoiceChannels'),
                    mpeOutputMode: document.getElementById('mpeOutputMode'),
                    mpeGlobalOutputChannel: document.getElementById('mpeGlobalOutputChannel'),
                    // Pattern Tab
                    enablePattern: document.getElementById('enablePattern'),
                    patternSteps: document.getElementById('patternSteps'),
                    patternStepsValue: document.getElementById('patternStepsValue'),
                    patternBeats: document.getElementById('patternBeats'),
                    patternBeatsValue: document.getElementById('patternBeatsValue'),
                    patternOffset: document.getElementById('patternOffset'),
                    patternOffsetValue: document.getElementById('patternOffsetValue'),
                    // Rhythm Tab
                    enableRhythm: document.getElementById('enableRhythm'),
                    rhythmSteps: document.getElementById('rhythmSteps'),
                    rhythmStepsValue: document.getElementById('rhythmStepsValue'),
                    rhythmBeats: document.getElementById('rhythmBeats'),
                    rhythmBeatsValue: document.getElementById('rhythmBeatsValue'),
                    rhythmOffset: document.getElementById('rhythmOffset'),
                    rhythmOffsetValue: document.getElementById('rhythmOffsetValue'),
                    // Arp Tab
                    clockDivision: document.getElementById('clockDivision'),
                    arpMode: document.getElementById('arpMode'),
                    chordNControls: document.getElementById('chordNControls'),
                    chordNValue: document.getElementById('chordNValue'),
                    chordNValueDisplay: document.getElementById('chordNValueDisplay'),
                    chordNOrdering: document.getElementById('chordNOrdering'),
                    maxChordExtension: document.getElementById('maxChordExtension'),
                    maxChordExtensionValue: document.getElementById('maxChordExtensionValue'),
                    maxTimeExtension: document.getElementById('maxTimeExtension'),
                    maxTimeExtensionValue: document.getElementById('maxTimeExtensionValue'),
                    walkParams: document.getElementById('walkParams'),
                    walkSkew: document.getElementById('walkSkew'),
                    walkSkewValue: document.getElementById('walkSkewValue'),
                    walkDistanceContainer: document.getElementById('walkDistanceContainer'),
                    walkDistance: document.getElementById('walkDistance'),
                    walkDistanceValue: document.getElementById('walkDistanceValue'),
                    subArpScale: document.getElementById('subArpScale'),
                    subArpScaleValue: document.getElementById('subArpScaleValue'),
                    subArpMode: document.getElementById('subArpMode'),
                    arpSyncMode: document.getElementById('arpSyncMode'),
                    octaves: document.getElementById('octaves'),
                    octavesValue: document.getElementById('octavesValue'),
                    baseVelocity: document.getElementById('baseVelocity'),
                    baseVelocityValue: document.getElementById('baseVelocityValue'),
                    maxVelocity: document.getElementById('maxVelocity'),
                    maxVelocityValue: document.getElementById('maxVelocityValue'),
                    gateLength: document.getElementById('gateLength'),
                    gateLengthValue: document.getElementById('gateLengthValue'),
                    enableGateFlex: document.getElementById('enableGateFlex'),
                    // Controls & Tabs
                    startButton: document.getElementById('startButton'),
                    stopButton: document.getElementById('stopButton'),
                    tabButtonsContainer: document.getElementById('tabButtons'),
                    tabPanes: document.querySelectorAll('.tab-pane'),
                };
                 // Populate channel selects
                 for (let i = 1; i <= 16; i++) {
                    let option = document.createElement('option'); option.value = i; option.text = `Channel ${i}`;
                    elements.mpeGlobalInputChannel.appendChild(option.cloneNode(true));
                    elements.mpeGlobalOutputChannel.appendChild(option.cloneNode(true));
                 }
                 // Set defaults if needed (though syncUIToState should handle this)
                 // elements.mpeGlobalInputChannel.value = 'omni';
                 // elements.mpeGlobalOutputChannel.value = '1';
             };

             const addEventListeners = () => {
                 // Start/Stop Buttons
                 elements.startButton.addEventListener('click', Main.startArpeggiator);
                 elements.stopButton.addEventListener('click', Main.stopArpeggiator);

                 // MIDI/MPE Tab
                 elements.midiInputSelect.addEventListener('change', (e) => Midi.selectInputDevice(e.target.value));
                 elements.midiOutputSelect.addEventListener('change', (e) => Midi.selectOutputDevice(e.target.value));
                 elements.tempoSource.addEventListener('change', (e) => Clock.setTempoSource(e.target.value));
                 elements.tempoBPMInput.addEventListener('change', (e) => Clock.setBPM(e.target.value));
                 elements.enableMPE.addEventListener('change', (e) => Midi.updateSettings({ isMPEEnabled: e.target.checked }));
                 elements.mpeGlobalInputChannel.addEventListener('change', (e) => Midi.updateSettings({ mpeGlobalInputChannel: e.target.value }));
                 elements.mpeInputVoiceChannels.addEventListener('change', (e) => Midi.updateSettings({ mpeInputVoiceChannels: parseInt(e.target.value) }));
                 elements.mpeOutputMode.addEventListener('change', (e) => Midi.updateSettings({ mpeOutputMode: e.target.value }));
                 elements.mpeGlobalOutputChannel.addEventListener('change', (e) => Midi.updateSettings({ mpeGlobalOutputChannel: e.target.value }));

                 // Pattern Tab Listeners
                 const patternControls = ['enablePattern', 'patternSteps', 'patternBeats', 'patternOffset'];
                 patternControls.forEach(id => {
                     const eventType = elements[id].type === 'checkbox' ? 'change' : 'input';
                     elements[id].addEventListener(eventType, handleRhythmChange);
                 });

                 // Rhythm Tab Listeners
                 const rhythmControls = ['enableRhythm', 'rhythmSteps', 'rhythmBeats', 'rhythmOffset'];
                  rhythmControls.forEach(id => {
                     const eventType = elements[id].type === 'checkbox' ? 'change' : 'input';
                     elements[id].addEventListener(eventType, handleRhythmChange);
                 });

                 // Arp Tab Listeners
                 elements.clockDivision.addEventListener('change', (e) => Clock.setClockDivision(e.target.value));
                 elements.arpMode.addEventListener('change', handleArpModeChange);
                 elements.arpSyncMode.addEventListener('change', (e) => State.setArpSyncMode(e.target.value));
                 elements.octaves.addEventListener('input', handleOctaveChange);
                 elements.baseVelocity.addEventListener('input', (e) => { State.set('baseVelocity', parseInt(e.target.value)); elements.baseVelocityValue.textContent = e.target.value; });
                 elements.maxVelocity.addEventListener('input', (e) => { State.set('maxVelocity', parseInt(e.target.value)); elements.maxVelocityValue.textContent = e.target.value; });
                 elements.gateLength.addEventListener('input', (e) => { State.set('gateLengthPercentage', parseInt(e.target.value)); elements.gateLengthValue.textContent = e.target.value; });
                 elements.enableGateFlex.addEventListener('change', (e) => State.set('isGateFlexEnabled', e.target.checked));
                 elements.subArpScale.addEventListener('input', (e) => { State.set('subArpScalePercentage', parseInt(e.target.value)); elements.subArpScaleValue.textContent = e.target.value; });
                 elements.subArpMode.addEventListener('change', (e) => State.set('subArpMode', e.target.value));

                 // Arp Mode Specific Controls
                 elements.chordNValue.addEventListener('input', (e) => { State.set('chordNValue', parseInt(e.target.value)); elements.chordNValueDisplay.textContent = e.target.value; ArpModes.updateModeNoteList(); });
                 elements.chordNOrdering.addEventListener('change', (e) => { State.set('chordNOrdering', e.target.value); ArpModes.updateModeNoteList(); });
                 elements.maxChordExtension.addEventListener('input', (e) => { State.set('maxChordExtension', parseInt(e.target.value)); elements.maxChordExtensionValue.textContent = e.target.value; });
                 elements.maxTimeExtension.addEventListener('input', (e) => { State.set('maxTimeExtensionDivisions', parseInt(e.target.value)); elements.maxTimeExtensionValue.textContent = e.target.value; });
                 elements.walkSkew.addEventListener('input', (e) => { const val = parseFloat(e.target.value); State.set('walkSkew', val); elements.walkSkewValue.textContent = val.toFixed(2); });
                 elements.walkDistance.addEventListener('input', (e) => { const val = parseFloat(e.target.value); State.set('walkDistance', val); elements.walkDistanceValue.textContent = val.toFixed(2); });

                 // Tab Buttons
                 elements.tabButtonsContainer.addEventListener('click', (e) => {
                     if (e.target.classList.contains('tab-button')) {
                         const tabId = e.target.dataset.tab;
                         // Deactivate all
                         elements.tabButtonsContainer.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
                         elements.tabPanes.forEach(pane => pane.classList.remove('active'));
                         // Activate clicked
                         e.target.classList.add('active');
                         document.getElementById(tabId)?.classList.add('active');
                     }
                 });
             };

              // --- Event Handlers ---
             const handleRhythmChange = () => {
                 const settings = {
                    isPatternDisabled: !elements.enablePattern.checked,
                    patternSteps: parseInt(elements.patternSteps.value),
                    patternBeats: parseInt(elements.patternBeats.value),
                    patternOffset: parseInt(elements.patternOffset.value),
                    isRhythmDisabled: !elements.enableRhythm.checked,
                    rhythmSteps: parseInt(elements.rhythmSteps.value),
                    rhythmBeats: parseInt(elements.rhythmBeats.value),
                    rhythmOffset: parseInt(elements.rhythmOffset.value),
                 };
                 Rhythm.updateSettings(settings); // Let Rhythm module handle validation and updates
             };

             const handleArpModeChange = (e) => {
                 const oldMode = State.get('arpMode');
                 const newMode = e.target.value;
                 const oldModeNoteList = [...State.get('currentModeNoteList')]; // Capture before change
                 const oldIndex = State.get('currentNoteIndex');

                 State.setArpMode(newMode);
                 const newModeNoteList = ArpModes.updateModeNoteList(); // Generate new list first

                 // Adjust index for continuity if running
                 if (State.get('isRunning') && oldModeNoteList.length > 0 && newModeNoteList.length > 0) {
                      const newIndex = ArpModes.findContinuationIndex(oldModeNoteList, newModeNoteList, oldIndex);
                      State.setCurrentNoteIndex(newIndex);
                 } else if (newModeNoteList.length === 0) {
                     State.setCurrentNoteIndex(0); // Reset if new list is empty
                 }

                 updateArpModeSpecificControls(newMode);
             };

             const handleOctaveChange = (e) => {
                 State.set('octaveCount', parseInt(e.target.value));
                 elements.octavesValue.textContent = e.target.value;
                 Midi.handleNoteChange(null, null); // Trigger full note update cycle
             };

             // --- UI Update Functions ---
             const renderPianoKeyboard = () => {
                 elements.pianoKeyboard.innerHTML = '';
                 const { START_NOTE, NUM_KEYS } = Config.INTERACTIVE_KEYBOARD;
                 for (let i = 0; i < NUM_KEYS; i++) {
                     const noteValue = START_NOTE + i;
                     if (noteValue > 127) break;
                     const noteName = Config.NOTES[noteValue % 12];
                     const key = document.createElement('div');
                     key.classList.add('key');
                     key.dataset.note = noteValue;
                     key.title = Utils.midiNoteToName(noteValue);
                     key.id = `pianoKey-${noteValue}`;
                     key.classList.add(noteName.includes('#') ? 'black-key' : 'white-key');
                     key.addEventListener('click', () => Midi.handleUINoteOn(noteValue));
                     elements.pianoKeyboard.appendChild(key);
                 }
             };

             const renderPlaybackKeyboard = () => {
                elements.playbackKeyboard.innerHTML = '';
                const { START_NOTE, NUM_KEYS } = Config.PLAYBACK_KEYBOARD;
                 for (let i = 0; i < NUM_KEYS; i++) {
                     const noteValue = START_NOTE + i;
                     if (noteValue > 127) break;
                     const noteName = Config.NOTES[noteValue % 12];
                     const key = document.createElement('div');
                     key.classList.add('playback-key');
                     key.dataset.note = noteValue;
                     key.id = `playbackKey-${noteValue}`;
                     key.classList.add(noteName.includes('#') ? 'playback-black-key' : 'playback-white-key');
                     elements.playbackKeyboard.appendChild(key);
                 }
             };

             const updatePianoKey = (note) => {
                 const keyElement = document.getElementById(`pianoKey-${note}`);
                 if (!keyElement) return;
                 const isHeldUI = State.get('heldNotesUI').has(note);
                 const isHeldMIDI = State.get('heldNotesMIDI').has(note);
                 // Current note highlight handled separately by highlightCurrentStep
                 keyElement.classList.toggle('key-held-ui', isHeldUI);
                 keyElement.classList.toggle('key-held-midi', isHeldMIDI && !isHeldUI); // MIDI only shown if not UI
             };

            const updatePlaybackKey = (note) => {
                 const keyElement = document.getElementById(`playbackKey-${note}`);
                 if (!keyElement) return;

                 const activeNotes = State.getActiveArpNotes(); // Get map directly
                 const isHeldUI = State.get('heldNotesUI').has(note);
                 const isHeldMIDI = State.get('heldNotesMIDI').has(note);
                 const isOctaveExpanded = State.get('heldNotes').includes(note) && !State.get('rawHeldNotes').includes(note);
                 const isActiveArp = activeNotes.has(note);
                 const noteState = isActiveArp ? activeNotes.get(note) : null;
                 const isGateExtended = isActiveArp && noteState.isExtended;

                 // Prioritize visual states
                 keyElement.classList.toggle('key-gate-extended', isGateExtended);
                 keyElement.classList.toggle('key-current', isActiveArp && !isGateExtended);
                 keyElement.classList.toggle('key-held-ui', !isActiveArp && isHeldUI);
                 keyElement.classList.toggle('key-held-midi', !isActiveArp && !isHeldUI && isHeldMIDI);
                 keyElement.classList.toggle('key-held-octave-expanded', !isActiveArp && !isHeldUI && !isHeldMIDI && isOctaveExpanded);
            };

             const updatePlaybackKeyboard = () => {
                 const keys = elements.playbackKeyboard.querySelectorAll('.playback-key');
                 keys.forEach(key => {
                     const note = parseInt(key.dataset.note);
                     updatePlaybackKey(note);
                 });
             };

             const updateRhythmDisplay = (displayId, rhythmArray, isDisabled) => {
                const displayElement = elements[displayId];
                 if (!displayElement) return;
                 displayElement.innerHTML = '';
                 if (!rhythmArray || rhythmArray.length === 0) return;

                 const baseClass = displayId === 'patternDisplay' ? 'note skip' : 'beat rest';
                 const eventMap = {
                     [Config.PATTERN_NOTE]: 'note', [Config.PATTERN_SKIP]: 'skip',
                     [Config.RHYTHM_BEAT]: 'beat', [Config.RHYTHM_REST]: 'rest',
                 };

                 rhythmArray.forEach((event, index) => {
                     const stepElement = document.createElement('div');
                     stepElement.classList.add('rhythm-step');
                     stepElement.id = `${displayId}-step-${index}`;
                     stepElement.innerText = event; // N/S or B/R
                     const eventClass = eventMap[event] || 'unknown';
                     stepElement.classList.add(eventClass);
                     stepElement.classList.toggle('disabled-step', isDisabled);
                     displayElement.appendChild(stepElement);
                 });
             };

             const updatePlaybackStepsDisplay = (stepType, noteOrChord, isChord = false) => {
                 const stepElem = document.createElement('div');
                 stepElem.classList.add('playback-step');

                 let textContent = '?';
                 let typeClass = 'error'; // Default to error

                 switch(stepType) {
                    case 'note':
                        typeClass = 'note';
                        if (isChord) {
                             if (State.get('arpMode') === 'chordN') {
                                 const list = State.get('currentModeNoteList');
                                 const idx = State.get('currentNoteIndex');
                                 const displayIndex = (list && list.length > 0) ? (idx % list.length) + 1 : '?';
                                 textContent = `Ch${displayIndex}`;
                             } else {
                                 textContent = 'Ch';
                             }
                         } else if (noteOrChord !== null) {
                            textContent = Utils.midiNoteToName(noteOrChord);
                         }
                         break;
                    case 'rest':
                        typeClass = 'rest';
                        textContent = 'R';
                        break;
                    case 'skip':
                         typeClass = 'skip';
                         textContent = 'S';
                         break;
                 }

                 stepElem.classList.add(typeClass);
                 stepElem.textContent = textContent;
                 elements.playbackDisplay.appendChild(stepElem);

                 // Auto-scroll
                 if (elements.playbackDisplay.children.length > Config.MAX_PLAYBACK_STEPS) {
                     elements.playbackDisplay.removeChild(elements.playbackDisplay.firstChild);
                 }
                 elements.playbackDisplay.scrollLeft = elements.playbackDisplay.scrollWidth;
             };

             const highlightRhythmStep = (displayId, stepIndex, gateExtension = 0) => {
                 const rhythmLength = (displayId === 'patternDisplay' ? Rhythm.getPatternRhythm()?.length : Rhythm.getRhythm()?.length) || 0;
                 if (rhythmLength === 0) return;

                 // Clear previous highlights first for THIS display
                 const currentStep = elements[displayId]?.querySelector('.current-step');
                 if (currentStep) currentStep.classList.remove('current-step');
                 elements[displayId]?.querySelectorAll('.gate-extended-step').forEach(el => el.classList.remove('gate-extended-step'));

                 // Highlight new step
                 const actualIndex = stepIndex % rhythmLength;
                 const stepElement = document.getElementById(`${displayId}-step-${actualIndex}`);
                 if (stepElement) {
                     stepElement.classList.add('current-step');
                     // Apply gate extension highlight (only for rhythm display)
                     if (State.get('isGateFlexEnabled') && displayId === 'rhythmDisplay' && gateExtension > 1) {
                         for (let i = 1; i < gateExtension; i++) {
                             const extendedStepIndex = (actualIndex + i) % rhythmLength;
                             const extendedStepElement = document.getElementById(`${displayId}-step-${extendedStepIndex}`);
                             if (extendedStepElement) {
                                 extendedStepElement.classList.add('gate-extended-step');
                             }
                         }
                     }
                 }
             };

             const unhighlightAllRhythmSteps = () => {
                 ['patternDisplay', 'rhythmDisplay'].forEach(displayId => {
                     const display = elements[displayId];
                     if(display) {
                        const currentStep = display.querySelector('.current-step');
                        if (currentStep) currentStep.classList.remove('current-step');
                        display.querySelectorAll('.gate-extended-step').forEach(el => el.classList.remove('gate-extended-step'));
                     }
                 });
             };

              const highlightCurrentStepVisuals = (stepType, noteOrChord, isChord) => {
                  // 1. Unhighlight previous interactive keyboard notes
                  elements.pianoKeyboard.querySelectorAll('.key.key-current').forEach(k => k.classList.remove('key-current'));

                  // 2. Highlight current rhythm steps (pattern and arp rhythm)
                  const rhythmIdx = State.get('currentRhythmIndex');
                  const patternIdx = State.get('currentPatternIndex');
                  const gateExt = State.get('isGateFlexEnabled') ? Rhythm.getGateMultiplier(rhythmIdx) : 0;
                  highlightRhythmStep('rhythmDisplay', rhythmIdx, gateExt);
                  highlightRhythmStep('patternDisplay', patternIdx); // No gate ext for pattern display


                  // 3. Highlight current note(s) on interactive keyboard
                  if (stepType === 'note' && noteOrChord !== null) {
                     const notesToHighlight = Array.isArray(noteOrChord) ? noteOrChord : [noteOrChord];
                     notesToHighlight.forEach(note => {
                         const keyElement = document.getElementById(`pianoKey-${note}`);
                         if (keyElement) keyElement.classList.add('key-current');
                     });
                  }

                 // 4. Playback keyboard is updated dynamically by updatePlaybackKey called during note start/stop/extend
             };

             const updateStartStopButtons = (isRunning) => {
                 elements.startButton.disabled = isRunning;
                 elements.stopButton.disabled = !isRunning;
                 // Using CSS classes for visual state might be cleaner than direct style manipulation
                 elements.startButton.classList.toggle('playing', isRunning); // 'playing' class makes it look active/disabled
                 elements.stopButton.classList.toggle('stopped', !isRunning); // 'stopped' class makes it look active/disabled
             };

             const updateArpModeSpecificControls = (arpMode) => {
                 elements.chordNControls.style.display = arpMode === 'chordN' ? 'block' : 'none';
                 const showWalk = arpMode === 'walk' || arpMode === 'normalWalk';
                 elements.walkParams.style.display = showWalk ? 'block' : 'none';
                 elements.walkDistanceContainer.style.display = arpMode === 'normalWalk' ? 'flex' : 'none'; // Use flex for slider-container
             };

              const updateTempoDisplay = (source, bpm) => {
                  const isInternal = source === 'internal';
                  elements.tempoBPMInput.disabled = !isInternal;
                  elements.tempoBPMDisplay.textContent = Math.round(bpm);
                  elements.tempoBPMInput.value = Math.round(bpm); // Keep input sync'd
                  // Optional: Add visual indication for external sync
                  elements.tempoBPMDisplay.style.backgroundColor = isInternal ? '#eee' : '#d0e0ff';
                  elements.tempoBPMDisplay.title = isInternal ? 'Internal Tempo' : 'External MIDI Clock Tempo';
              };

             const updateRhythmControlsState = (rhythmState) => {
                elements.enablePattern.checked = !rhythmState.isPatternDisabled;
                elements.patternSteps.disabled = rhythmState.isPatternDisabled;
                elements.patternBeats.disabled = rhythmState.isPatternDisabled;
                elements.patternOffset.disabled = rhythmState.isPatternDisabled;
                elements.patternSteps.value = rhythmState.patternSteps;
                elements.patternBeats.value = rhythmState.patternBeats;
                elements.patternOffset.value = rhythmState.patternOffset;
                elements.patternStepsValue.textContent = rhythmState.patternSteps;
                elements.patternBeatsValue.textContent = rhythmState.patternBeats;
                elements.patternOffsetValue.textContent = rhythmState.patternOffset;
                 // Update dynamic max/min for sliders based on steps
                elements.patternBeats.max = rhythmState.patternSteps;
                const patternOffsetMax = Math.floor(rhythmState.patternSteps / 2);
                elements.patternOffset.min = -patternOffsetMax;
                elements.patternOffset.max = patternOffsetMax;


                elements.enableRhythm.checked = !rhythmState.isRhythmDisabled;
                elements.rhythmSteps.disabled = rhythmState.isRhythmDisabled;
                elements.rhythmBeats.disabled = rhythmState.isRhythmDisabled;
                elements.rhythmOffset.disabled = rhythmState.isRhythmDisabled;
                elements.rhythmSteps.value = rhythmState.rhythmSteps;
                elements.rhythmBeats.value = rhythmState.rhythmBeats;
                elements.rhythmOffset.value = rhythmState.rhythmOffset;
                elements.rhythmStepsValue.textContent = rhythmState.rhythmSteps;
                elements.rhythmBeatsValue.textContent = rhythmState.rhythmBeats;
                elements.rhythmOffsetValue.textContent = rhythmState.rhythmOffset;
                // Update dynamic max/min for sliders based on steps
                elements.rhythmBeats.max = rhythmState.rhythmSteps;
                const rhythmOffsetMax = Math.floor(rhythmState.rhythmSteps / 2);
                elements.rhythmOffset.min = -rhythmOffsetMax;
                elements.rhythmOffset.max = rhythmOffsetMax;
             };

             // Initialize UI state from State module defaults
             const syncUIToState = () => {
                const state = State.getState();
                const rhythmState = Rhythm.getRhythmState();

                 // MIDI/MPE
                 elements.tempoSource.value = Clock.getTempoSource(); // Use getter
                 elements.enableMPE.checked = state.isMPEEnabled;
                 elements.mpeGlobalInputChannel.value = Midi.getSetting('mpeGlobalInputChannel');
                 elements.mpeInputVoiceChannels.value = Midi.getSetting('mpeInputVoiceChannels');
                 elements.mpeOutputMode.value = Midi.getSetting('mpeOutputMode');
                 elements.mpeGlobalOutputChannel.value = Midi.getSetting('mpeGlobalOutputChannel');

                 // Pattern/Rhythm
                 updateRhythmControlsState(rhythmState);
                 updateRhythmDisplay('patternDisplay', rhythmState.patternRhythm, rhythmState.isPatternDisabled);
                 updateRhythmDisplay('rhythmDisplay', rhythmState.rhythm, rhythmState.isRhythmDisabled);


                 // Arp
                 elements.clockDivision.value = Clock.getClockDivision(); // Use getter
                 elements.arpMode.value = state.arpMode;
                 elements.arpSyncMode.value = state.arpSyncMode;
                 elements.octaves.value = state.octaveCount;
                 elements.octavesValue.textContent = state.octaveCount;
                 elements.baseVelocity.value = state.baseVelocity;
                 elements.baseVelocityValue.textContent = state.baseVelocity;
                 elements.maxVelocity.value = state.maxVelocity;
                 elements.maxVelocityValue.textContent = state.maxVelocity;
                 elements.gateLength.value = state.gateLengthPercentage;
                 elements.gateLengthValue.textContent = state.gateLengthPercentage;
                 elements.enableGateFlex.checked = state.isGateFlexEnabled;
                 elements.subArpScale.value = state.subArpScalePercentage;
                 elements.subArpScaleValue.textContent = state.subArpScalePercentage;
                 elements.subArpMode.value = state.subArpMode;

                 // Arp Mode Specific
                 elements.chordNValue.value = state.chordNValue;
                 elements.chordNValueDisplay.textContent = state.chordNValue;
                 elements.chordNOrdering.value = state.chordNOrdering;
                 elements.maxChordExtension.value = state.maxChordExtension;
                 elements.maxChordExtensionValue.textContent = state.maxChordExtension;
                 elements.maxTimeExtension.value = state.maxTimeExtensionDivisions;
                 elements.maxTimeExtensionValue.textContent = state.maxTimeExtensionDivisions;
                 elements.walkSkew.value = state.walkSkew;
                 elements.walkSkewValue.textContent = state.walkSkew.toFixed(2);
                 elements.walkDistance.value = state.walkDistance;
                 elements.walkDistanceValue.textContent = state.walkDistance.toFixed(2);

                 updateArpModeSpecificControls(state.arpMode);
                 updateStartStopButtons(state.isRunning);
                 updateTempoDisplay(Clock.getTempoSource(), Clock.getBPM()); // Use getters
             };


            return {
                init: () => {
                    cacheElements();
                    renderPianoKeyboard();
                    renderPlaybackKeyboard();
                    addEventListeners();
                    syncUIToState(); // Set initial UI values from defaults
                },
                updateMidiStatus: (text) => { elements.midiStatus.textContent = text; },
                populateMidiDeviceLists: (inputs, outputs) => {
                     elements.midiInputSelect.innerHTML = '<option value="">No input device selected</option>';
                     inputs.forEach(input => {
                         const option = document.createElement('option');
                         option.value = input.id;
                         option.text = input.name || `Input ${input.id.substring(0, 6)}`;
                         elements.midiInputSelect.appendChild(option);
                     });
                     elements.midiOutputSelect.innerHTML = '<option value="">No output device selected</option>';
                     outputs.forEach(output => {
                         const option = document.createElement('option');
                         option.value = output.id;
                         option.text = output.name || `Output ${output.id.substring(0, 6)}`;
                         elements.midiOutputSelect.appendChild(option);
                     });
                },
                updatePianoKey: updatePianoKey,
                updatePlaybackKey: updatePlaybackKey,
                updatePlaybackKeyboard: updatePlaybackKeyboard,
                 updateRhythmDisplays: (rhythmState) => { // Called by Rhythm module
                     updateRhythmControlsState(rhythmState); // Sync sliders first
                     updateRhythmDisplay('patternDisplay', rhythmState.patternRhythm, rhythmState.isPatternDisabled);
                     updateRhythmDisplay('rhythmDisplay', rhythmState.rhythm, rhythmState.isRhythmDisabled);
                 },
                updatePlaybackDisplay: updatePlaybackStepsDisplay,
                highlightCurrentStep: highlightCurrentStepVisuals,
                unhighlightCurrentStep: () => {
                    unhighlightAllRhythmSteps();
                    elements.pianoKeyboard.querySelectorAll('.key.key-current').forEach(k => k.classList.remove('key-current'));
                    // Playback keyboard unhighlighting happens naturally via updatePlaybackKey
                },
                updateStartStopButtons: updateStartStopButtons,
                updateTempoDisplay: updateTempoDisplay,
                // --- Function added ---
                clearPlaybackDisplay: () => {
                    if (elements.playbackDisplay) {
                        elements.playbackDisplay.innerHTML = '';
                    }
                }
            };
        })();

        // --- Main Application Logic ---
        const Main = (() => {

             const initialize = () => {
                 UI.init();
                 Midi.init().then(() => {
                     // Get initial settings from UI elements (which were set by syncUIToState)
                     const initialMidiSettings = {
                         isMPEEnabled: UI.elements.enableMPE.checked, // Direct access OK during init
                         mpeGlobalInputChannel: UI.elements.mpeGlobalInputChannel.value,
                         mpeInputVoiceChannels: parseInt(UI.elements.mpeInputVoiceChannels.value),
                         mpeOutputMode: UI.elements.mpeOutputMode.value,
                         mpeGlobalOutputChannel: UI.elements.mpeGlobalOutputChannel.value,
                     };
                     Midi.updateSettings(initialMidiSettings);

                     // Clock init uses defaults and UI values internally now
                     Clock.init();

                     const initialRhythmSettings = {
                        isPatternDisabled: !UI.elements.enablePattern.checked, // Direct access OK during init
                        patternSteps: parseInt(UI.elements.patternSteps.value),
                        patternBeats: parseInt(UI.elements.patternBeats.value),
                        patternOffset: parseInt(UI.elements.patternOffset.value),
                        isRhythmDisabled: !UI.elements.enableRhythm.checked,
                        rhythmSteps: parseInt(UI.elements.rhythmSteps.value),
                        rhythmBeats: parseInt(UI.elements.rhythmBeats.value),
                        rhythmOffset: parseInt(UI.elements.rhythmOffset.value),
                    };
                    Rhythm.updateSettings(initialRhythmSettings); // Initialize rhythm engine

                    // Initialize Arp Modes based on default UI selection
                    ArpModes.updateModeNoteList();

                 }).catch(err => {
                    console.error("Error during MIDI initialization:", err);
                    // Proceed with non-MIDI parts if possible
                 });
             };

             const startArpeggiator = () => {
                 if (State.get('isRunning')) return;
                 State.setRunning(true);

                 // Force update of mode list and reset shuffle orders on start
                 State.updateShuffleOrdersOnNoteChange(); // Refresh stable shuffle based on current notes
                 if (State.get('arpMode') === 'shuffled') {
                    State.set('shuffledNotesOrder', ArpModes.generateShuffledNoteList(State.getHeldNotes()));
                 }
                 ArpModes.updateModeNoteList(); // Regenerate list for current mode

                 State.resetIndices();
                 State.clearActiveNotes(); // Clear any stale notes from previous runs
                 UI.clearPlaybackDisplay(); // Call UI function *** FIX ***
                 Clock.start();
                 UI.updateStartStopButtons(true);
                 // console.log("Arpeggiator Started");
             };

             const stopArpeggiator = () => {
                 if (!State.get('isRunning')) return;
                 State.setRunning(false);
                 Clock.stop();
                 Playback.stopAllNotes(); // Send note offs for active arp notes
                 UI.unhighlightCurrentStep();
                 UI.updateStartStopButtons(false);
                 // console.log("Arpeggiator Stopped");
                 // UI.updatePlaybackKeyboard(); // Refresh playback kbd state after stopping
             };

             // Transport Controls (called by MIDI handler)
            const transportStart = () => {
                // console.log("Transport Start Action");
                 Clock.resetTickCounter();
                 if (!State.get('isRunning')) {
                    startArpeggiator();
                 } else {
                     // If already running, reset indices? Or let it continue? Let's reset.
                     State.resetIndices();
                     // State.clearActiveNotes(); // Don't clear notes, just reset position
                     UI.clearPlaybackDisplay();
                 }
            };
            const transportContinue = () => {
                 // console.log("Transport Continue Action");
                 // Continue should ideally resume state, but for now, just start if stopped
                 if (!State.get('isRunning')) {
                    startArpeggiator();
                 }
             };
            const transportStop = () => {
                 // console.log("Transport Stop Action");
                 if (State.get('isRunning')) {
                    stopArpeggiator();
                 }
             };


             // The core step function, called by Clock module
             const arpStep = () => {
                 if (!State.get('isRunning')) return;

                 // 0. Check Time Limits for ChordN extended notes
                  Playback.checkActiveNoteTimeLimits();

                 // 1. Determine Step Type (Note, Rest, Skip) based on Rhythms
                 const rhythmEvent = Rhythm.getCurrentRhythmEvent();
                 let stepType = 'rest'; // Default assumption
                 let noteOrChordForStep = null;
                 let isChord = false;
                 let advanceNoteIdx = false; // Flag to control note index advancement

                 if (rhythmEvent === Config.RHYTHM_BEAT) {
                    // Process pattern only on a beat
                    const patternEvent = Rhythm.getCurrentPatternEvent();
                    if (patternEvent === Config.PATTERN_NOTE) {
                         stepType = 'note'; // Tentative, might become rest if no notes to play
                         advanceNoteIdx = true; // Assume we advance index unless mode logic prevents it
                    } else if (patternEvent === Config.PATTERN_SKIP) {
                         stepType = 'skip';
                         advanceNoteIdx = true; // Skip *does* advance the note index
                    }
                     State.advancePatternIndex(); // Advance pattern index only on a beat
                 } else {
                     stepType = 'rest';
                     advanceNoteIdx = false; // Rest never advances note index
                     // Do not advance pattern index on a rest
                 }

                  // 2. Handle Skips (Loop until a Note or end of pattern?) - Simplified: treat skip as advance + rest for this step
                  // Original complex skip loop removed for simplification in refactor step, can be added back if essential.
                  // Current logic: Skip advances index but plays nothing THIS step.
                  if (stepType === 'skip') {
                      // Play nothing, but flags indicate index should advance
                  }

                  // 3. Get Note(s) if Step Type is 'Note'
                  if (stepType === 'note') {
                     const arpMode = State.get('arpMode');
                     const heldNotes = State.getHeldNotes();
                     const modeNotes = State.get('currentModeNoteList');
                     const currentIdx = State.get('currentNoteIndex');

                     if (heldNotes.length === 0 && State.get('arpSyncMode') !== 'free') {
                         stopArpeggiator(); // Stop if no notes left (except in free sync)
                         return;
