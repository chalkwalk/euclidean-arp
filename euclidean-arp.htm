                     }
                     if (heldNotes.length === 0 && State.get('arpSyncMode') === 'free') {
                          stepType = 'rest'; // Treat as rest if free sync and no notes
                          advanceNoteIdx = false;
                     } else if (arpMode === 'chord' || arpMode === 'chordN') {
                         isChord = true;
                         if (modeNotes?.length > 0) {
                             noteOrChordForStep = modeNotes[currentIdx % modeNotes.length];
                             if (!noteOrChordForStep || noteOrChordForStep.length === 0) {
                                 stepType = 'rest'; // Invalid chord data? Treat as rest.
                                 advanceNoteIdx = false;
                             }
                         } else {
                             stepType = 'rest'; // No chords generated, treat as rest
                             advanceNoteIdx = false;
                         }
                     } else if (arpMode === 'random') {
                          if (heldNotes.length > 0) {
                             noteOrChordForStep = heldNotes[Math.floor(Math.random() * heldNotes.length)];
                             isChord = false;
                         } else { stepType = 'rest'; }
                         advanceNoteIdx = false; // Random doesn't advance index in the traditional way
                     } else if (arpMode === 'walk' || arpMode === 'normalWalk') {
                          if (modeNotes?.length > 0) {
                             noteOrChordForStep = modeNotes[currentIdx % modeNotes.length];
                             isChord = false;
                             // Index advancement handled later by specific walk functions
                             advanceNoteIdx = false; // Let walk advance functions handle it
                         } else {
                             stepType = 'rest';
                             advanceNoteIdx = false;
                         }
                     } else { // Standard index-based modes
                         if (modeNotes?.length > 0) {
                             noteOrChordForStep = modeNotes[currentIdx % modeNotes.length];
                             isChord = false;
                             if (noteOrChordForStep === undefined || noteOrChordForStep === null) {
                                 stepType = 'rest'; // Invalid data?
                                 advanceNoteIdx = false;
                             }
                         } else {
                             stepType = 'rest'; // Empty list
                             advanceNoteIdx = false;
                         }
                     }
                  } // End of getting note logic

                 // 4. Play Note(s) if applicable
                 if (stepType === 'note' && noteOrChordForStep !== null) {
                     Playback.playNotesForStep(noteOrChordForStep);
                 }

                 // 5. Update UI Displays
                 UI.updatePlaybackDisplay(stepType, noteOrChordForStep, isChord);
                 UI.highlightCurrentStep(stepType, noteOrChordForStep, isChord);

                 // 6. Advance Indices
                 State.advanceRhythmIndex(); // Always advance rhythm index

                 if (advanceNoteIdx) { // Advance based on step type and mode logic
                     if (State.get('arpMode') === 'stableShuffled') {
                         State.incrementStableShuffleIndex();
                     } else {
                         State.incrementNoteIndex(); // Handles wrap-around
                     }
                 }
                 // Handle specific walk advancements separately
                 if (State.get('arpMode') === 'walk') {
                     ArpModes.advanceWalkIndex();
                 } else if (State.get('arpMode') === 'normalWalk') {
                     ArpModes.advanceNormalWalkIndex();
                 }

             };

             // --- Public Methods ---
             return {
                 initialize: initialize,
                 startArpeggiator: startArpeggiator,
                 stopArpeggiator: stopArpeggiator,
                 transportStart: transportStart,
                 transportContinue: transportContinue,
                 transportStop: transportStop,
                 arpStep: arpStep // Called by Clock
             };
        })();

        // --- Global Initialization ---
        document.addEventListener('DOMContentLoaded', Main.initialize);

    </script>
</body>
