<html>
<head>
    <title>MPE Euclidean Arpeggiator (Refactored - Fixed)</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; color: #333; }
        .rhythm-display { display: flex; margin-bottom: 10px; min-height: 27px; /* Prevent layout shift */}
        .rhythm-step {
            width: 25px; height: 25px; border: 1px solid #ccc; text-align: center;
            line-height: 25px; font-size: 12px; margin-right: 2px; border-radius: 3px;
            background-color: #f0f0f0; color: #333; transition: background-color 0.1s, border-color 0.1s;
        }
        .rhythm-step.beat { background-color: #b2f0b2; border-color: #8fcc8f; color: #005000; }
        .rhythm-step.rest { background-color: #f0b2b2; border-color: #cc8f8f; color: #500000; }
        .rhythm-step.skip { background-color: #b2b2f0; border-color: #8f8fcc; color: #000050; }
        .rhythm-step.note { background-color: #f0f0b2; border-color: #ccf08f; color: #505000; }
        .rhythm-step.current-step { border: 2px solid blue; font-weight: bold; box-shadow: 0 0 3px blue; }
        .rhythm-step.disabled-step { background-color: #e0e0e0; border-color: #bbb; color: #999; }
        .rhythm-step.gate-extended-step { background-color: #cceeff; border-color: #aaccdd; }

        .parameter-group { margin-bottom: 15px; border: 1px solid #ccc; padding: 10px 15px; border-radius: 5px; background-color: #fafafa; }
        .parameter-group legend { font-weight: bold; color: #444; }
        .parameter-group h3 { margin-top: 0; margin-bottom: 10px; color: #555; font-size: 1.1em; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .note-selector { margin-bottom: 15px; }
        .piano-keyboard { display: flex; border: 1px solid #aaa; border-radius: 5px; overflow: hidden; background-color: #ddd; height: 82px; }
        .key {
            height: 80px; border-left: 1px solid #ccc; border-bottom: 1px solid #bbb; box-sizing: border-box;
            cursor: pointer; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px;
            font-size: 10px; user-select: none; transition: background-color 0.1s ease, border-color 0.1s ease;
        }
        .white-key { width: 30px; background-color: white; color: black; }
        .black-key {
            width: 20px; background-color: black; color: white; height: 55px; margin-left: -10px; margin-right: -10px;
            z-index: 1; border-bottom: 1px solid #333; border-left-color: #555; border-right-color: #555;
        }
        .key.key-held-ui { background-color: #aaddff; border-color: #77aadd; color: black; border-bottom: unset; }
        .key.key-held-midi { background-color: #aaffaa; border-color: #77cc77; color: black; border-bottom: unset; }
        .key.key-current { background-color: #ffddaa; border-color: #ddaa77; border-width: 2px; border-bottom: unset; }

        .playback-keyboard-container { display: flex; justify-content: center; margin-bottom: 10px; }
        .playback-keyboard { display: flex; border: 1px solid #aaa; border-radius: 5px; overflow: hidden; width: 720px; height: 40px; background-color: #ccc; }
        .playback-key {
            height: 100%; border-left: 1px solid #ddd; border-bottom: 1px solid #bbb; box-sizing: border-box;
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 2px; font-size: 8px;
            user-select: none; transition: background-color 0.1s ease; cursor: default;
        }
        /* Adjusted widths for 61 keys in 720px (approx 36 white, 25 black keys) */
        .playback-white-key { width: calc(720px / 36); background-color: white; color: black; }
        .playback-black-key {
            width: calc(720px / 36 * 0.6); background-color: black; color: white; height: 70%;
            margin-left: calc(-720px / 36 * 0.3); margin-right: calc(-720px / 36 * 0.3);
            z-index: 1; border-bottom: 1px solid #333;
        }
        .playback-key.key-held-ui { background-color: #99ccee; border-bottom: unset; }
        .playback-key.key-held-midi { background-color: #ccffcc; border-bottom: unset; }
        .playback-key.key-held-octave-expanded { background-color: #cceeff; color: black; border-bottom: unset; }
        .playback-key.key-current { background-color: #ffddaa; border: 1px solid #ccc; border-bottom: unset; }
        .playback-key.key-gate-extended { background-color: #ffddee; border-bottom: unset; }

        .playback-display { display: flex; overflow-x: auto; /* Allow scrolling if needed */ border: 1px solid #ccc; height: 30px; margin-bottom: 10px; background-color: #eee; border-radius: 3px; padding: 2px 5px; white-space: nowrap; }
        .playback-step {
            min-width: 25px; /* Allow slightly wider for text */ height: 20px; border: 1px solid #ddd; margin-right: 2px; text-align: center;
            line-height: 20px; font-size: 10px; border-radius: 2px; background-color: #fff; padding: 0 3px; flex-shrink: 0; /* Prevent shrinking */
        }
        .playback-step.note { background-color: #ffffdd; }
        .playback-step.rest { background-color: #ffdddd; }
        .playback-step.skip { background-color: #ddddff; }
        .playback-step.error { background-color: orange; color: white; }

        .device-selector { margin-bottom: 10px; }
        .slider-container { display: flex; align-items: center; margin-bottom: 8px; }
        .slider-container label { margin-right: 10px; width: 140px; /* Consistent width */ text-align: right; font-size: 0.9em; color: #666; }
        .slider-container input[type="range"] { width: 300px; cursor: pointer; }
        .slider-container input[type="checkbox"] { margin-right: 5px; }
        .slider-container input[type="checkbox"] + label { width: auto; text-align: left; } /* Adjust label for checkbox */
        .slider-container select, .slider-container input[type="number"] { flex-grow: 1; max-width: 150px; }
        .number-display { width: 35px; text-align: center; margin-left: 8px; font-size: 0.9em; color: #777; background-color: #f0f0f0; padding: 2px; border-radius: 2px; }

        #tempoBPMDisplay {
            font-weight: bold; font-size: 1.1em; color: #333; margin-left: 5px; background-color: #eee; padding: 3px 6px; border-radius: 3px; min-width: 40px; text-align: center;
        }
        #tempoBPMInput { width: 60px; margin-left: 5px; text-align: center;}

        #midiStatus { margin-bottom: 10px; font-size: 0.9em; color: #777; padding: 5px; background-color: #eee; border-radius: 3px; }
        h1 { color: #333; border-bottom: 2px solid #ddd; padding-bottom: 5px; margin-bottom: 15px; }
        label { font-size: 0.95em; color: #444; }
        select, input[type="number"], input[type="range"], button, input[type="checkbox"] {
            padding: 6px; border: 1px solid #ccc; border-radius: 3px; font-size: 0.9em; margin-bottom: 5px; vertical-align: middle;
        }
        button.control-button { padding: 8px 15px; font-size: 1em; }
        button { background-color: #eee; cursor: pointer; transition: background-color 0.2s ease; }
        button:hover { background-color: #ddd; }
        button:disabled { background-color: #f0f0f0; color: #999; cursor: default; }
        #startButton.playing { background-color: #f0b2b2; color: #500000; } /* Red when running */
        #stopButton.stopped { background-color: #b2f0b2; color: #005000; } /* Green when stopped */

        /* --- TAB STYLES --- */
        .tab-container { border: 1px solid #ccc; border-radius: 5px; overflow: hidden; background-color: #fdfdfd; margin-bottom: 15px; }
        .tab-buttons { display: flex; background-color: #e9e9e9; border-bottom: 1px solid #ccc; }
        .tab-button {
            padding: 10px 15px; border: none; background-color: transparent; cursor: pointer; border-right: 1px solid #ccc;
            font-size: 0.9em; color: #555; transition: background-color 0.2s, color 0.2s;
        }
        .tab-button:last-child { border-right: none; }
        .tab-button.active { background-color: #fdfdfd; color: #333; font-weight: bold; border-bottom: 1px solid #fdfdfd; margin-bottom: -1px; }
        .tab-button:hover:not(.active) { background-color: #dcdcdc; }
        .tab-content { padding: 15px; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>
    <h1>MPE Euclidean Arpeggiator (Refactored - Fixed)</h1>

    <div class="note-selector" title="Use this keyboard to select notes with the mouse.">
        <strong>Select UI Notes:</strong>
        <div class="piano-keyboard" id="pianoKeyboard">
            <!-- Interactive piano keys generated by UI.renderPianoKeyboard -->
        </div>
    </div>

    <div class="tab-container">
        <div class="tab-buttons" id="tabButtons">
            <button class="tab-button active" data-tab="midi-mpe-tab">MIDI & MPE</button>
            <button class="tab-button" data-tab="pattern-tab">Pattern</button>
            <button class="tab-button" data-tab="rhythm-tab">Rhythm</button>
            <button class="tab-button" data-tab="arp-tab">Arp</button>
        </div>

        <div id="midi-mpe-tab" class="tab-content tab-pane active">
             <fieldset class="parameter-group">
                <legend>MIDI & MPE Settings</legend>
                <!-- Content generated/managed by UI module -->
                <div id="midiStatus">MIDI Status: Initializing...</div>

                <div class="device-selector" title="Select your MIDI input device.">
                    <label for="midiInputSelect">MIDI Input:</label>
                    <select id="midiInputSelect" title="Choose the MIDI input device to receive notes and clock from.">
                        <option value="">No input device selected</option>
                    </select>
                </div>

                <div class="device-selector" title="Select your MIDI output device.">
                    <label for="midiOutputSelect">MIDI Output:</label>
                    <select id="midiOutputSelect" title="Choose the MIDI output device to send arpeggiated notes to.">
                        <option value="">No output device selected</option>
                    </select>
                </div>
                 <hr style="border: none; border-top: 1px solid #eee; margin: 10px 0;">
                <div class="slider-container" title="Source of tempo: internal BPM or external MIDI clock.">
                    <label for="tempoSource">Tempo Source:</label>
                    <select id="tempoSource" title="Choose whether the tempo is controlled internally or by external MIDI clock.">
                        <option value="internal">Internal</option>
                        <option value="external">External MIDI Clock</option>
                    </select>
                </div>

                <div class="slider-container" title="Tempo in Beats Per Minute (BPM). Only active when Tempo Source is Internal.">
                    <label for="tempoBPMInput">Tempo (Internal):</label>
                    <input type="number" id="tempoBPMInput" value="120" min="10" max="300" title="Set the tempo in BPM for internal clock.">
                    <span id="tempoBPMDisplay">120</span> BPM
                </div>
                <hr style="border: none; border-top: 1px solid #eee; margin: 10px 0;">
                <div class="slider-container" title="Enable or disable MPE input processing.">
                    <input type="checkbox" id="enableMPE" title="Enable MPE (MIDI Polyphonic Expression) input for per-note control.">
                    <label for="enableMPE">Enable MPE Input</label>
                </div>

                <div class="slider-container" title="MIDI channel for MPE global messages or Omni for all channels.">
                    <label for="mpeGlobalInputChannel">MPE Global Input Ch:</label>
                    <select id="mpeGlobalInputChannel" title="Set the MIDI channel for MPE global control messages, or Omni to listen to all channels.">
                        <option value="omni">Omni</option>
                        <!-- Options 1-16 generated by UI module -->
                    </select>
                </div>

                <div class="slider-container" title="Number of MIDI channels used for MPE voice messages.">
                    <label for="mpeInputVoiceChannels">MPE Input Voice Chs:</label>
                    <input type="number" id="mpeInputVoiceChannels" value="8" min="1" max="15" title="Specify the number of MIDI channels to use for MPE voice messages.">
                </div>
                 <hr style="border: none; border-top: 1px solid #eee; margin: 10px 0;">
                <div class="slider-container" title="Output mode: Non-MPE (single channel) or MPE.">
                    <label for="mpeOutputMode">Output Mode:</label>
                    <select id="mpeOutputMode" title="Choose the MIDI output mode: Non-MPE (single channel) or MPE.">
                        <option value="non-mpe">Non-MPE (Single Channel)</option>
                        <option value="mpe">MPE</option>
                    </select>
                </div>

                <div class="slider-container" title="MIDI channel for MPE global output or base channel for non-MPE.">
                    <label for="mpeGlobalOutputChannel">Output Base/Global Ch:</label>
                    <select id="mpeGlobalOutputChannel" title="Set the MIDI channel for MPE global output or the base channel for non-MPE output.">
                        <!-- Options 1-16 generated by UI module -->
                    </select>
                </div>
            </fieldset>
        </div>

        <div id="pattern-tab" class="tab-content tab-pane">
            <fieldset class="parameter-group">
                <legend>Pattern Settings (Skips)</legend>
                 <!-- Content generated/managed by UI module -->
                <div class="slider-container" title="Enable or disable the pattern rhythm.">
                    <input type="checkbox" id="enablePattern" checked title="Enable pattern rhythm to introduce skips.">
                    <label for="enablePattern">Enable Pattern</label>
                </div>
                <div class="slider-container" title="Number of steps in the pattern rhythm.">
                    <label for="patternSteps">Steps:</label>
                    <input type="range" id="patternSteps" value="5" min="1" max="32" step="1" title="Adjust the number of steps in the pattern.">
                    <span id="patternStepsValue" class="number-display">5</span>
                </div>
                <div class="slider-container" title="Number of notes (non-skips) within the pattern steps.">
                    <label for="patternBeats">Notes:</label>
                    <input type="range" id="patternBeats" value="3" min="1" max="5" step="1" title="Adjust the number of notes (vs skips) in the pattern rhythm.">
                    <span id="patternBeatsValue" class="number-display">3</span>
                </div>
                <div class="slider-container" title="Offset (rotation) of the pattern rhythm.">
                    <label for="patternOffset">Offset:</label>
                    <input type="range" id="patternOffset" value="0" min="-2" max="2" step="1" title="Shift the pattern rhythm forwards or backwards.">
                    <span id="patternOffsetValue" class="number-display">0</span>
                </div>
                <div id="patternDisplay" class="rhythm-display" title="Visual representation of the pattern rhythm (Note/Skip)."></div>
            </fieldset>
        </div>

        <div id="rhythm-tab" class="tab-content tab-pane">
            <fieldset class="parameter-group">
                <legend>Rhythm Settings (Rests)</legend>
                 <!-- Content generated/managed by UI module -->
                 <div class="slider-container" title="Enable or disable the arpeggio rhythm.">
                    <input type="checkbox" id="enableRhythm" checked title="Enable arpeggio rhythm to introduce rests.">
                    <label for="enableRhythm">Enable Rhythm</label>
                </div>
                <div class="slider-container" title="Number of steps in the arpeggio rhythm.">
                    <label for="rhythmSteps">Steps:</label>
                    <input type="range" id="rhythmSteps" value="7" min="1" max="32" step="1" title="Adjust the number of steps in the arpeggio rhythm.">
                    <span id="rhythmStepsValue" class="number-display">7</span>
                </div>
                <div class="slider-container" title="Number of beats (non-rests) within the arpeggio rhythm steps.">
                    <label for="rhythmBeats">Beats:</label>
                    <input type="range" id="rhythmBeats" value="5" min="1" max="7" step="1" title="Adjust the number of beats (vs rests) in the arpeggio rhythm.">
                    <span id="rhythmBeatsValue" class="number-display">5</span>
                </div>
                <div class="slider-container" title="Offset (rotation) of the arpeggio rhythm.">
                    <label for="rhythmOffset">Offset:</label>
                    <input type="range" id="rhythmOffset" value="0" min="-4" max="4" step="1" title="Shift the arpeggio rhythm forwards or backwards.">
                    <span id="rhythmOffsetValue" class="number-display">0</span>
                </div>
                <div id="rhythmDisplay" class="rhythm-display" title="Visual representation of the arpeggio rhythm (Beat/Rest)."></div>
            </fieldset>
        </div>

        <div id="arp-tab" class="tab-content tab-pane">
             <fieldset class="parameter-group">
                <legend>Arp & Playback Settings</legend>
                <!-- Content generated/managed by UI module -->
                <div class="slider-container" title="Clock division for arpeggiator step timing.">
                    <label for="clockDivision">Clock Division:</label>
                    <select id="clockDivision" title="Set the clock division to control the speed of the arpeggio steps.">
                        <option value="1/1">1/1</option>
                        <option value="1/2">1/2</option>
                        <option value="1/4" selected="selected">1/4</option>
                        <option value="1/8">1/8</option>
                        <option value="1/16">1/16</option>
                        <option value="1/32">1/32</option>
                        <option value="1/2T">1/2T</option>
                        <option value="1/4T">1/4T</option>
                        <option value="1/8T">1/8T</option>
                        <option value="1/16T">1/16T</option>
                        <option value="1/32T">1/32T</option>
                    </select>
                </div>

                <div class="slider-container" title="Arpeggio mode determines the order notes are played.">
                    <label for="arpMode">Arp Mode:</label>
                    <select id="arpMode" title="Select the arpeggio playback mode.">
                        <option value="up" selected="selected">Up</option>
                        <option value="down">Down</option>
                        <option value="upDown">Up/Down</option>
                        <option value="upDownInclusive">Up/Down (Incl.)</option>
                        <option value="random">Random</option>
                        <option value="converge">Converge</option>
                        <option value="diverge">Diverge</option>
                        <option value="played">Played</option>
                        <option value="shuffled">Shuffled</option>
                        <option value="stableShuffled">Stable Shuffled</option>
                        <option value="chord">Chord</option>
                        <option value="chordN">ChordN</option>
                        <option value="convergeDiverge">Converge/Diverge</option>
                        <option value="convergeDivergeInclusive">Converge/Diverge (Incl.)</option>
                        <option value="walk">Walk</option>
                        <option value="normalWalk">Normal Walk</option>
                    </select>
                </div>

                <div id="chordNControls" style="display: none; border-left: 3px solid #b2b2f0; padding-left: 10px; margin-left: 5px;">
                    <div class="slider-container" title="Number of notes in each chord for ChordN mode.">
                        <label for="chordNValue">N:</label>
                        <input type="range" id="chordNValue" value="2" min="1" max="16" step="1" title="Set the number of notes per chord in ChordN arpeggio mode.">
                        <span id="chordNValueDisplay" class="number-display">2</span>
                    </div>
                    <div class="slider-container" title="Ordering mode for ChordN chords.">
                        <label for="chordNOrdering">Chord Ordering:</label>
                        <select id="chordNOrdering" title="Select the ordering mode for ChordN chords.">
                            <option value="up">Up</option>
                            <option value="down">Down</option>
                            <option value="upDown">Up/Down</option>
                            <option value="upDownInclusive">Up/Down (Incl.)</option>
                            <option value="converge">Converge</option>
                            <option value="diverge">Diverge</option>
                        </select>
                    </div>
                    <div class="slider-container" title="Maximum number of consecutive chords a note can be held across in ChordN mode. 1 means no extension.">
                        <label for="maxChordExtension">Max Chord Extend:</label>
                        <input type="range" id="maxChordExtension" value="2" min="1" max="16" step="1" title="Maximum number of consecutive chords a note can be held across in ChordN mode.">
                        <span id="maxChordExtensionValue" class="number-display">2</span>
                    </div>
                    <div class="slider-container" title="Maximum number of clock divisions a note's gate can be extended in ChordN mode.">
                        <label for="maxTimeExtension">Max Time Extend (Divs):</label>
                        <input type="range" id="maxTimeExtension" value="16" min="1" max="64" step="1" title="Maximum number of clock divisions a note's gate can be extended in ChordN mode.">
                        <span id="maxTimeExtensionValue" class="number-display">16</span>
                    </div>
                </div>

                <div id="walkParams" style="display: none; border-left: 3px solid #b2b2f0; padding-left: 10px; margin-left: 5px;">
                    <div class="slider-container" title="Skew parameter for Walk arpeggio mode.">
                        <label for="walkSkew">Walk Skew:</label>
                        <input type="range" id="walkSkew" value="0" min="-1" max="1" step="0.01" title="Adjust the skew for Walk arpeggio mode, affecting probability of steps.">
                        <span id="walkSkewValue" class="number-display">0.00</span>
                    </div>
                    <div class="slider-container" id="walkDistanceContainer" style="display: none;">
                        <label for="walkDistance">Walk Distance:</label>
                        <input type="range" id="walkDistance" value="0" min="0" max="1" step="0.01" title="Adjust the distance for Normal Walk arpeggio mode, affecting step size.">
                        <span id="walkDistanceValue" class="number-display">0.00</span>
                    </div>
                </div>
                 <hr style="border: none; border-top: 1px solid #eee; margin: 10px 0;">
                <div class="slider-container" title="Percentage of clock division used for sub-arpeggiation of chords.">
                    <label for="subArpScale">Sub Arp Scale (%):</label>
                    <input type="range" id="subArpScale" value="0" min="0" max="100" step="1" title="Control the timing spread of notes within chords. 0% for no sub-arp, 100% to fill clock division.">
                    <span id="subArpScaleValue" class="number-display">0</span>
                </div>
                <div class="slider-container" title="Arpeggio mode for sub-arpeggiation of chords.">
                    <label for="subArpMode">Sub Arp Mode:</label>
                    <select id="subArpMode" title="Select the arpeggio mode for sub-arpeggiation within chords.">
                        <option value="up">Up</option>
                        <option value="down">Down</option>
                        <option value="random">Random</option>
                        <option value="converge">Converge</option>
                        <option value="diverge">Diverge</option>
                    </select>
                </div>
                 <hr style="border: none; border-top: 1px solid #eee; margin: 10px 0;">
                <div class="slider-container" title="Synchronization mode for the arpeggiator.">
                    <label for="arpSyncMode">Arp Sync Mode:</label>
                    <select id="arpSyncMode" title="Choose the synchronization mode for starting and stopping the arpeggiator.">
                        <option value="free">Free Sync</option>
                        <option value="key" selected="selected">Key Sync</option>
                        <option value="transport">Transport Sync</option>
                    </select>
                </div>

                <div class="slider-container" title="Number of octaves to expand held notes across.">
                    <label for="octaves">Octaves:</label>
                    <input type="range" id="octaves" value="1" min="1" max="4" step="1" title="Expand the range of arpeggiated notes by adding octaves above the held notes.">
                    <span id="octavesValue" class="number-display">1</span>
                </div>
                <div class="slider-container" title="Base velocity for arpeggiated notes.">
                    <label for="baseVelocity">Base Velocity:</label>
                    <input type="range" id="baseVelocity" value="96" min="1" max="127" step="1" title="Set the base velocity for arpeggiated notes. Velocity can be further modified by MPE or aftertouch.">
                    <span id="baseVelocityValue" class="number-display">96</span>
                </div>
                <div class="slider-container" title="Maximum velocity for arpeggiated notes.">
                    <label for="maxVelocity">Max Velocity:</label>
                    <input type="range" id="maxVelocity" value="127" min="1" max="127" step="1" title="Set the maximum velocity for arpeggiated notes. Used in conjunction with base velocity and pressure.">
                    <span id="maxVelocityValue" class="number-display">127</span>
                </div>
                <div class="slider-container" title="Gate length as a percentage of the clock division.">
                    <label for="gateLength">Gate Length (%):</label>
                    <input type="range" id="gateLength" value="50" min="1" max="150" step="1" title="Adjust the gate length of arpeggiated notes as a percentage of the clock division duration.">
                    <span id="gateLengthValue" class="number-display">50</span>
                </div>
                <div class="slider-container" title="Enable gate flex to extend note gates based on rhythm density.">
                    <input type="checkbox" id="enableGateFlex" title="Enable Gate Flex to make gates longer before rests.">
                    <label for="enableGateFlex">Enable Gate Flex</label>
                </div>
            </fieldset>
        </div>
    </div>

    <div class="playback-keyboard-container" title="Visual display of held and playing notes. Not interactive.">
        <div class="playback-keyboard" id="playbackKeyboardDisplay">
            <!-- Playback piano keys generated by UI.renderPlaybackKeyboard -->
        </div>
    </div>

    <div class="playback-display" id="playbackDisplay" title="Displays the sequence of played notes and rhythms."></div>

    <button id="startButton" title="Start the arpeggiator." class="control-button">Start Arpeggiator</button>
    <button id="stopButton" disabled title="Stop the arpeggiator." class="control-button">Stop Arpeggiator</button>

    <script>
        /**
         * @fileoverview Euclidean MPE Arpeggiator Prototype (Refactored - Fixed)
         * Refactored version focusing on modularity, maintainability, and clarity.
         * Core functionality remains the same as the original version.
         * Introduces logical modules (Config, State, Midi, Clock, Rhythm, ArpModes, Playback, UI)
         * to encapsulate state and behavior.
         * Fixes errors related to module interaction and getter exposure.
         */

        // --- Polyfills & Utilities ---
        // Helper to compare arrays (simple shallow comparison)
        const Utils = {
            arraysAreEqual: (arr1, arr2) => {
                if (!arr1 || !arr2 || arr1.length !== arr2.length) return false;
                for (let i = 0; i < arr1.length; i++) {
                    if (arr1[i] !== arr2[i]) return false;
                }
                return true;
            },
            // Box-Muller transform for normal distribution sampling
            sampleNormalDistribution: (mu, sigma) => {
                let u1 = 0, u2 = 0;
                while (u1 === 0) u1 = Math.random();
                while (u2 === 0) u2 = Math.random();
                const z0 = Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2);
                return z0 * sigma + mu;
            },
            // Calculate Euclidean Rhythm
            generateEuclideanRhythm: (steps, beats, offset, beatEvent, restEvent, isDisabled = false) => {
                if (isDisabled || steps <= 0) {
                    return new Array(steps > 0 ? steps : 0).fill(beatEvent);
                }
                beats = Math.min(beats, steps);
                const rhythm = new Array(steps).fill(restEvent);
                let beatIndex = 0;
                for (let i = 0; i < steps; i++) {
                    if (Math.floor((beatIndex * steps) / beats) === i) {
                        rhythm[i] = beatEvent;
                        beatIndex++;
                    }
                }
                const actualOffset = offset % steps;
                const positiveOffset = actualOffset >= 0 ? actualOffset : steps + actualOffset;
                if (positiveOffset > 0) {
                    return [...rhythm.slice(steps - positiveOffset), ...rhythm.slice(0, steps - positiveOffset)];
                }
                return rhythm;
            },
             // Convert MIDI note number to name (e.g., C4)
             midiNoteToName: (note) => {
                const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
                const octave = Math.floor(note / 12) - 1;
                const noteName = notes[note % 12];
                return noteName + octave;
            }
        };

        // --- Configuration Constants ---
        const Config = {
            NOTES: ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"],
            RHYTHM_BEAT: 'B',
            RHYTHM_REST: 'R',
            PATTERN_NOTE: 'N',
            PATTERN_SKIP: 'S',
            DEFAULT_NOTE_PRESSURE: 0,
            DEFAULT_MPE_Y_AXIS: 0,
            MAX_PLAYBACK_STEPS: 32, // Increased slightly
            LOOKAHEAD_MAX_STEPS: 64,
            INTERACTIVE_KEYBOARD: { START_NOTE: 48, NUM_KEYS: 25 }, // C3-C5
            PLAYBACK_KEYBOARD: { START_NOTE: 36, NUM_KEYS: 61 }, // C2-C7
            MIDI_TICKS_PER_QUARTER: 24,
            MIDI_CLOCK_TICK_HISTORY_SIZE: 24,
            MIN_GATE_DURATION_MS: 5
        };

        // --- Arpeggiator State Module ---
        const State = (() => {
            let state = {
                // Core Arp State
                isRunning: false,
                arpMode: 'up',
                arpSyncMode: 'key',
                currentNoteIndex: 0,
                currentRhythmIndex: 0,
                currentPatternIndex: 0,
                currentModeNoteList: [], // Notes/chords for the current mode iteration
                shuffledNotesOrder: [],  // For 'shuffled' mode
                stableShuffledOrder: [], // For 'stableShuffled' mode
                stableShuffleIndex: 0,
                lastNotesToArpStableShuffle: [], // Track notes for stable shuffle regeneration

                // Held Notes State
                rawHeldNotes: [],       // Original notes held (MIDI + UI)
                heldNotes: [],          // Octave-expanded, unique notes
                heldNotesUI: new Set(), // Notes held by UI click
                heldNotesMIDI: new Set(),// Notes held by MIDI input
                sustainedNotesMIDI: new Set(), // Notes held by sustain pedal
                isSustainPedalPressed: false,
                notePressures: new Map(), // originalNote -> pressure (0-127)
                noteMPEYAxis: new Map(),  // originalNote -> y-axis (0-127)
                octaveExpandedNoteMap: new Map(), // expandedNote -> originalNote
                playedNoteOrder: [],    // Raw notes in order played

                /** @type {Map<number, {noteOffTimeoutId: number | null, isExtended: boolean, chordsHeldCount: number, timeHeldDivisions: number, outputChannel: number}>} */
                activeArpNotes: new Map(), // expandedNote -> { state }

                // Settings (mirrored from UI, managed by UI module updates)
                octaveCount: 1,
                baseVelocity: 96,
                maxVelocity: 127,
                gateLengthPercentage: 50,
                isGateFlexEnabled: false,
                subArpScalePercentage: 0,
                subArpMode: 'up',
                chordNValue: 2,
                chordNOrdering: 'up',
                maxChordExtension: 2,
                maxTimeExtensionDivisions: 16,
                walkSkew: 0,
                walkDistance: 0,
            };

            return {
                // Getters
                get: (key) => state[key],
                getState: () => ({ ...state }), // Return a copy for inspection
                getRawHeldNotes: () => [...state.rawHeldNotes],
                getHeldNotes: () => [...state.heldNotes],
                getActiveArpNotes: () => state.activeArpNotes, // Direct access for Playback module needed
                getNotePressure: (originalNote) => state.notePressures.get(originalNote) ?? Config.DEFAULT_NOTE_PRESSURE,
                getNoteMPEYAxis: (originalNote) => state.noteMPEYAxis.get(originalNote) ?? Config.DEFAULT_MPE_Y_AXIS,
                getOriginalNote: (expandedNote) => {
                    if (state.rawHeldNotes.includes(expandedNote)) return expandedNote;
                    return state.octaveExpandedNoteMap.get(expandedNote) ?? null;
                },

                // Setters / Modifiers
                set: (key, value) => { state[key] = value; },
                setRunning: (isRunning) => { state.isRunning = isRunning; },
                setArpMode: (mode) => { state.arpMode = mode; }, // Note: Needs updateModeNoteList call after
                setArpSyncMode: (mode) => { state.arpSyncMode = mode; },
                setCurrentNoteIndex: (index) => { state.currentNoteIndex = index; },
                setStableShuffleIndex: (index) => { state.stableShuffleIndex = index; },
                incrementNoteIndex: () => {
                    if (state.currentModeNoteList?.length > 0) {
                         state.currentNoteIndex = (state.currentNoteIndex + 1) % state.currentModeNoteList.length;
                    } else {
                         state.currentNoteIndex = 0;
                    }
                },
                 incrementStableShuffleIndex: () => {
                    if (state.stableShuffledOrder?.length > 0) {
                         state.stableShuffleIndex = (state.stableShuffleIndex + 1) % state.stableShuffledOrder.length;
                    } else {
                         state.stableShuffleIndex = 0;
                    }
                },
                advanceRhythmIndex: (steps = 1) => {
                    const len = Rhythm.getRhythm()?.length ?? 0;
                    if (len > 0) state.currentRhythmIndex = (state.currentRhythmIndex + steps) % len;
                    else state.currentRhythmIndex = 0;
                },
                advancePatternIndex: (steps = 1) => {
                     const len = Rhythm.getPatternRhythm()?.length ?? 0;
                    if (len > 0) state.currentPatternIndex = (state.currentPatternIndex + steps) % len;
                    else state.currentPatternIndex = 0;
                },
                resetIndices: () => {
                    state.currentNoteIndex = 0;
                    state.currentRhythmIndex = 0;
                    state.currentPatternIndex = 0;
                    state.stableShuffleIndex = 0;
                     // Initial index for walk modes
                    if ((state.arpMode === 'walk' || state.arpMode === 'normalWalk') && state.currentModeNoteList?.length > 0) {
                        state.currentNoteIndex = Math.floor(state.currentModeNoteList.length / 2);
                    }
                },
                 // --- Note Management ---
                 // Returns true if a note was actually added, false otherwise
                addHeldNote: (note, source = 'ui') => {
                    const isUI = source === 'ui';
                    const heldSet = isUI ? state.heldNotesUI : state.heldNotesMIDI;
                    let noteAdded = false;

                    if (isUI) {
                        if (!heldSet.has(note)) { // Add
                            heldSet.add(note);
                            if (!state.rawHeldNotes.includes(note)) { // Ensure not already added by MIDI
                                state.rawHeldNotes.push(note);
                                state.playedNoteOrder.push(note);
                                state.notePressures.set(note, Config.DEFAULT_NOTE_PRESSURE);
                                state.noteMPEYAxis.set(note, Config.DEFAULT_MPE_Y_AXIS);
                                noteAdded = true;
                            }
                        } else { // Remove (UI toggle)
                            heldSet.delete(note);
                            // Only remove from raw if NOT held by MIDI
                            if (!state.heldNotesMIDI.has(note)) {
                                const rawIdx = state.rawHeldNotes.indexOf(note);
                                if (rawIdx > -1) state.rawHeldNotes.splice(rawIdx, 1);
                                const playedIdx = state.playedNoteOrder.indexOf(note);
                                if (playedIdx > -1) state.playedNoteOrder.splice(playedIdx, 1);
                                state.notePressures.delete(note);
                                state.noteMPEYAxis.delete(note);
                            }
                        }
                    } else { // MIDI source
                        if (!heldSet.has(note)) {
                            heldSet.add(note);
                             if (!state.rawHeldNotes.includes(note)) { // Ensure not already added by UI
                                state.rawHeldNotes.push(note);
                                state.playedNoteOrder.push(note);
                                state.notePressures.set(note, Config.DEFAULT_NOTE_PRESSURE); // Pressure set later by actual MIDI msg
                                state.noteMPEYAxis.set(note, Config.DEFAULT_MPE_Y_AXIS); // Y-axis set later by actual MIDI msg
                                noteAdded = true;
                             }
                        }
                        // MIDI Note On with velocity 0 handled in removeHeldNote via Midi module
                    }
                    return noteAdded;
                },
                 // Returns true if a note was actually removed from rawHeldNotes, false otherwise
                removeHeldNote: (note, source = 'midi') => {
                    const isUI = source === 'ui'; // Should normally only be called for MIDI off or sustain release
                    const heldSet = isUI ? state.heldNotesUI : state.heldNotesMIDI;
                    let noteRemovedFromRaw = false;

                    if (source === 'midi' && state.isSustainPedalPressed) {
                        if (heldSet.has(note)) { // Only sustain if it was actually held by MIDI
                            state.sustainedNotesMIDI.add(note);
                            // Don't remove from heldSet yet, just mark for sustain
                            return false; // Not removed from raw yet
                        }
                    }

                    if (heldSet.has(note)) {
                        heldSet.delete(note);
                        // Only remove from raw if NOT held by the *other* source
                        const otherSet = isUI ? state.heldNotesMIDI : state.heldNotesUI;
                        if (!otherSet.has(note)) {
                            const rawIdx = state.rawHeldNotes.indexOf(note);
                            if (rawIdx > -1) {
                                state.rawHeldNotes.splice(rawIdx, 1);
                                noteRemovedFromRaw = true;
                            }
                            const playedIdx = state.playedNoteOrder.indexOf(note);
                            if (playedIdx > -1) state.playedNoteOrder.splice(playedIdx, 1);
                            state.notePressures.delete(note);
                            state.noteMPEYAxis.delete(note);
                        }
                    }
                    return noteRemovedFromRaw;
                },
                 // Process notes released by sustain pedal up
                releaseSustainedNotes: () => {
                    const notesToRemove = [...state.sustainedNotesMIDI];
                    state.sustainedNotesMIDI.clear();
                    let notesChanged = false;
                    notesToRemove.forEach(sustainedNote => {
                        // If the note is still in heldNotesMIDI (meaning key wasn't repressed), remove it
                        if (state.heldNotesMIDI.has(sustainedNote)) {
                             if (State.removeHeldNote(sustainedNote, 'midi')) { // Call remove again, this time without sustain active
                                 notesChanged = true;
                                 Midi.clearMpeChannelForNote(sustainedNote); // Clear MPE tracking if needed
                             }
                        }
                    });
                    return notesChanged; // Indicate if rawHeldNotes list potentially changed
                },
                // Updates heldNotes from rawHeldNotes based on octaveCount
                updateOctaveExpandedNotes: () => {
                    state.rawHeldNotes.sort((a, b) => a - b); // Sort for consistency
                    const expandedNotesSet = new Set();
                    state.octaveExpandedNoteMap.clear();

                    for (let i = 0; i < state.octaveCount; i++) {
                        for (const originalNote of state.rawHeldNotes) {
                            const expandedNote = originalNote + (12 * i);
                            if (expandedNote <= 127) { // Check MIDI range
                                if (!expandedNotesSet.has(expandedNote)) {
                                     expandedNotesSet.add(expandedNote);
                                     if (i > 0) { // Only map if it's actually expanded
                                         state.octaveExpandedNoteMap.set(expandedNote, originalNote);
                                     }
                                }
                            }
                        }
                    }
                    // Update heldNotes array (no sort needed here, order determined by ArpModes)
                    state.heldNotes = Array.from(expandedNotesSet);
                    // Note: ArpModes.updateModeNoteList() must be called separately after this
                },
                 updateShuffleOrdersOnNoteChange: (addedNote = null, removedNote = null) => {
                    const currentRawNotes = State.getRawHeldNotes(); // Use raw notes for comparison basis

                    // --- Stable Shuffle ---
                    if (!Utils.arraysAreEqual(currentRawNotes, state.lastNotesToArpStableShuffle)) {
                        state.stableShuffledOrder = ArpModes.generateShuffledNoteList(state.heldNotes); // Generate based on *expanded* notes
                        state.lastNotesToArpStableShuffle = [...currentRawNotes]; // Store *raw* notes signature
                        if (state.isRunning) {
                            state.stableShuffleIndex = 0; // Reset index on note change if running
                        }
                    }

                     // --- Shuffled (more dynamic) ---
                    if (state.isRunning && state.arpMode === 'shuffled') {
                        if (addedNote !== null && state.heldNotes.includes(addedNote)) {
                             // Add to existing shuffle order if arp running
                            const insertionIndex = Math.floor(Math.random() * (state.shuffledNotesOrder.length + 1));
                            state.shuffledNotesOrder.splice(insertionIndex, 0, addedNote);
                            if (insertionIndex <= state.currentNoteIndex) {
                                state.currentNoteIndex++; // Adjust index if inserted before current
                            }
                        } else if (removedNote !== null) {
                             // Remove from existing shuffle order
                             const noteIndex = state.shuffledNotesOrder.indexOf(removedNote);
                             if (noteIndex !== -1) {
                                 state.shuffledNotesOrder.splice(noteIndex, 1);
                                 if (noteIndex < state.currentNoteIndex && state.currentNoteIndex > 0) {
                                     state.currentNoteIndex--; // Adjust index if removed before current
                                 }
                                 // Ensure index stays within bounds
                                 if (state.shuffledNotesOrder.length > 0) {
                                    state.currentNoteIndex %= state.shuffledNotesOrder.length;
                                 } else {
                                    state.currentNoteIndex = 0;
                                 }
                             }
                        }
                         // Update the mode list directly (only matters for shuffle mode)
                        if(state.arpMode === 'shuffled') {
                            state.currentModeNoteList = state.shuffledNotesOrder;
                        }
                    }
                 },
                 clearActiveNotes: () => {
                    state.activeArpNotes.clear();
                 }
            };
        })();

        // --- Arpeggio Mode Logic Module ---
        const ArpModes = (() => {

            // --- Private Helper Generators ---
            const generateAlternatingVariant = (notes) => {
                if (!notes || notes.length <= 2) return [...(notes || [])];
                return [...notes, ...[...notes].reverse().slice(1, -1)];
            };
            const generateInclusiveAlternatingVariant = (notes) => {
                 if (!notes || notes.length === 0) return [];
                return [...notes, ...[...notes].reverse()];
            };
            const generateUpList = (notes) => [...(notes || [])].sort((a, b) => a - b);
            const generateDownList = (notes) => [...(notes || [])].sort((a, b) => b - a);
            const generateConvergeList = (notes) => {
                if (!notes || notes.length <= 1) return [...(notes || [])];
                const sortedNotes = generateUpList(notes);
                const convergeList = [];
                let start = 0, end = sortedNotes.length - 1;
                while (start <= end) {
                    convergeList.push(sortedNotes[start]);
                    if (start !== end) convergeList.push(sortedNotes[end]);
                    start++; end--;
                }
                return convergeList;
            };
            const generateDivergeList = (notes) => {
                if (!notes || notes.length <= 1) return [...(notes || [])];
                const sortedNotes = generateUpList(notes);
                const divergeList = [];
                let start = Math.floor((sortedNotes.length - 1) / 2);
                let end = Math.ceil((sortedNotes.length - 1) / 2);
                while (start >= 0 || end < sortedNotes.length) {
                    if (start >= 0) divergeList.push(sortedNotes[start]);
                    if (start !== end && end < sortedNotes.length) divergeList.push(sortedNotes[end]);
                    start--; end++;
                }
                return divergeList;
            };
            const generatePlayedList = (heldNotes) => {
                 return State.get('playedNoteOrder').filter(note => heldNotes.includes(note));
            };
            const generateShuffledList = (notes) => [...(notes || [])].sort(() => Math.random() - 0.5);

             // --- ChordN Helpers ---
             const generateChordNCombinations = (notes, n) => {
                if (!notes || notes.length === 0 || n <= 0) return [];
                const sortedNotes = generateUpList(notes);
                n = Math.min(n, sortedNotes.length);
                const combinations = [];
                function combine(currentCombination, startIndex) {
                    if (currentCombination.length === n) {
                        combinations.push([...currentCombination]); return;
                    }
                    if (startIndex >= sortedNotes.length) return;
                    for (let i = startIndex; i < sortedNotes.length; i++) {
                        if (currentCombination.length + (sortedNotes.length - i) < n) break;
                        currentCombination.push(sortedNotes[i]);
                        combine(currentCombination, i + 1);
                        currentCombination.pop();
                    }
                }
                combine([], 0);
                return combinations;
            };
            const orderChordNCombinations = (combinations, orderingMode) => {
                 if (!combinations || combinations.length <= 1) return combinations;
                 // Base sort by first note for converge/diverge consistency
                 combinations.sort((a, b) => (a[0] ?? 0) - (b[0] ?? 0));

                 switch (orderingMode) {
                    case 'up': return combinations; // Already sorted this way mostly
                    case 'down': return [...combinations].reverse();
                    case 'upDown': return generateAlternatingVariant(combinations);
                    case 'upDownInclusive': return generateInclusiveAlternatingVariant(combinations);
                    case 'converge': return generateConvergeList(combinations); // Apply list converge to chords
                    case 'diverge': return generateDivergeList(combinations);   // Apply list diverge to chords
                    default: return combinations;
                }
            };

             // --- Public Mode Generators Map ---
             const modeGenerators = {
                'up': generateUpList,
                'down': generateDownList,
                'upDown': (notes) => generateAlternatingVariant(generateUpList(notes)),
                'upDownInclusive': (notes) => generateInclusiveAlternatingVariant(generateUpList(notes)),
                'converge': generateConvergeList,
                'diverge': generateDivergeList,
                'convergeDiverge': (notes) => generateAlternatingVariant(generateConvergeList(notes)),
                'convergeDivergeInclusive': (notes) => generateInclusiveAlternatingVariant(generateConvergeList(notes)),
                'played': generatePlayedList,
                'random': () => [], // Random uses State.heldNotes directly in playback logic
                'shuffled': () => State.get('shuffledNotesOrder'), // Uses pre-shuffled list
                'stableShuffled': () => State.get('stableShuffledOrder'), // Uses stable list
                'chord': (notes) => notes && notes.length > 0 ? [[...notes]] : [],
                'chordN': (notes) => {
                    const n = State.get('chordNValue');
                    const order = State.get('chordNOrdering');
                    const combinations = generateChordNCombinations(notes, n);
                    return orderChordNCombinations(combinations, order);
                },
                'walk': generateUpList, // Walk modes operate on a sorted list
                'normalWalk': generateUpList,
            };

            // --- Public Methods ---
            return {
                // Generates the note list for the current mode based on current held notes
                updateModeNoteList: () => {
                    const arpMode = State.get('arpMode');
                    const notesToArp = State.getHeldNotes(); // Use octave-expanded notes
                    let newModeNoteList = [];

                    if (modeGenerators[arpMode]) {
                        newModeNoteList = modeGenerators[arpMode](notesToArp);
                    } else {
                        console.warn(`Unknown arp mode: ${arpMode}. Defaulting to 'up'.`);
                        newModeNoteList = modeGenerators['up'](notesToArp);
                    }
                    State.set('currentModeNoteList', newModeNoteList);
                    return newModeNoteList;
                },
                 // Finds the best index in the new list corresponding to the note at the old index
                findContinuationIndex: (oldModeNoteList, newModeNoteList, oldIndex) => {
                    if (!newModeNoteList || newModeNoteList.length === 0) return 0;

                    const arpMode = State.get('arpMode');
                    const oldListLength = oldModeNoteList?.length ?? 0;
                    const newListLength = newModeNoteList.length;

                    // Handle Chord/ChordN modes with proportional mapping
                    if ((arpMode === 'chord' || arpMode === 'chordN') && oldListLength > 0) {
                        return Math.floor((oldIndex / oldListLength) * newListLength) % newListLength || 0;
                    }

                     // For non-chord modes, find the note value
                    if (oldListLength === 0) return 0; // Cannot find note from empty list
                    const noteToFind = oldModeNoteList[oldIndex % oldListLength];
                    if (noteToFind === undefined || noteToFind === null) { // Safety check
                        // Fallback proportional mapping
                         return Math.floor((oldIndex / oldListLength) * newListLength) % newListLength || 0;
                    }

                     // Search for the note, prioritizing matches *after* the old index position proportionally
                    let bestIndex = -1;
                    const proportionalStartIndex = Math.floor((oldIndex / oldListLength) * newListLength);

                    for (let i = 0; i < newListLength; i++) {
                        const currentIndex = (proportionalStartIndex + i) % newListLength;
                        if (newModeNoteList[currentIndex] === noteToFind) {
                             bestIndex = currentIndex;
                             break; // Found the first match after proportional start
                        }
                    }

                    // If not found searching forward, try finding the first occurrence anywhere
                     if (bestIndex === -1) {
                        bestIndex = newModeNoteList.indexOf(noteToFind);
                    }

                    // If still not found (note removed), use proportional index as fallback
                    if (bestIndex === -1) {
                        bestIndex = proportionalStartIndex % newListLength || 0;
                    }

                    return bestIndex;
                },
                 // --- Walk Mode Advancement ---
                 advanceWalkIndex: () => {
                    const modeList = State.get('currentModeNoteList');
                    let currentIndex = State.get('currentNoteIndex');
                    if (modeList?.length > 0) {
                        const skew = State.get('walkSkew');
                        const { next, current, prev } = ArpModes.calculateWalkProbabilities(skew);
                        const rand = Math.random();
                        if (rand < prev) {
                            currentIndex = (currentIndex - 1 + modeList.length) % modeList.length;
                        } else if (rand >= prev + current) { // rand >= prob_prev + prob_current means 'next'
                            currentIndex = (currentIndex + 1) % modeList.length;
                        } // else: stays the same
                        State.setCurrentNoteIndex(currentIndex);
                    }
                },
                advanceNormalWalkIndex: () => {
                    const modeList = State.get('currentModeNoteList');
                    let currentIndex = State.get('currentNoteIndex');
                    if (modeList?.length > 0) {
                         const skew = State.get('walkSkew');
                         const distance = State.get('walkDistance');
                         const sigma = 0.3 + distance * 2;
                         const mu = skew * (modeList.length / 4);
                         const stepChange = Utils.sampleNormalDistribution(mu, sigma);
                         const maxStepChange = Math.ceil(modeList.length / 2);
                         const clampedStepChange = Math.max(-maxStepChange, Math.min(maxStepChange, Math.round(stepChange)));
                         currentIndex = (currentIndex + clampedStepChange + modeList.length) % modeList.length;
                         State.setCurrentNoteIndex(currentIndex);
                    }
                },
                calculateWalkProbabilities: (skew) => {
                    skew = Math.max(-1, Math.min(1, skew));
                    let prob_prev = Math.max(0, (1 / 3) * (1 - skew));
                    let prob_next = Math.max(0, (1 / 3) * (1 + skew));
                    let prob_current = Math.max(0, 1 - prob_prev - prob_next);
                    const total = prob_prev + prob_current + prob_next;
                    if (total > 0) {
                        return { next: prob_next / total, current: prob_current / total, prev: prob_prev / total };
                    }
                    return { next: 1/3, current: 1/3, prev: 1/3 };
                },
                // Expose generator for shuffle updates
                generateShuffledNoteList: generateShuffledList,
            };
        })();


        // --- Rhythm Engine Module ---
        const Rhythm = (() => {
            let rhythmState = {
                patternSteps: 5,
                patternBeats: 3,
                patternOffset: 0,
                isPatternDisabled: false,
                patternRhythm: [],

                rhythmSteps: 7,
                rhythmBeats: 5,
                rhythmOffset: 0,
                isRhythmDisabled: false,
                rhythm: [],
                rhythmGateMultipliers: [],
            };

            const calculateGateMultipliers = (rhythmArray) => {
                const len = rhythmArray.length;
                if (len === 0) return [];
                const multipliers = new Array(len).fill(0);
                let beatCount = 0;
                for(let step of rhythmArray) if(step === Config.RHYTHM_BEAT) beatCount++;

                if (beatCount === 0) return multipliers; // All rests

                for (let i = 0; i < len; i++) {
                    if (rhythmArray[i] === Config.RHYTHM_BEAT) {
                        if (beatCount === 1) {
                             multipliers[i] = len; // Only one beat, hold for full cycle
                             continue;
                        }
                        let stepsToNextBeat = 1;
                        let nextIndex = (i + 1) % len;
                        while (rhythmArray[nextIndex] !== Config.RHYTHM_BEAT) { // Stop when next beat is found
                            stepsToNextBeat++;
                            nextIndex = (nextIndex + 1) % len;
                        }
                        multipliers[i] = stepsToNextBeat;
                    }
                }
                return multipliers;
            };

            const updateInternalRhythms = () => {
                 rhythmState.patternRhythm = Utils.generateEuclideanRhythm(
                    rhythmState.patternSteps, rhythmState.patternBeats, rhythmState.patternOffset,
                    Config.PATTERN_NOTE, Config.PATTERN_SKIP, rhythmState.isPatternDisabled
                 );
                 rhythmState.rhythm = Utils.generateEuclideanRhythm(
                    rhythmState.rhythmSteps, rhythmState.rhythmBeats, rhythmState.rhythmOffset,
                    Config.RHYTHM_BEAT, Config.RHYTHM_REST, rhythmState.isRhythmDisabled
                 );
                 rhythmState.rhythmGateMultipliers = calculateGateMultipliers(rhythmState.rhythm);
            };

            return {
                updateSettings: (settings) => {
                    // Update state from UI/provided settings object
                    rhythmState = { ...rhythmState, ...settings };
                    // Ensure beats <= steps
                    rhythmState.patternBeats = Math.min(rhythmState.patternBeats, rhythmState.patternSteps);
                    rhythmState.rhythmBeats = Math.min(rhythmState.rhythmBeats, rhythmState.rhythmSteps);
                     // Ensure offset is within reasonable bounds dynamically
                    const patternOffsetMax = Math.floor(rhythmState.patternSteps / 2);
                    rhythmState.patternOffset = Math.max(-patternOffsetMax, Math.min(patternOffsetMax, rhythmState.patternOffset));
                    const rhythmOffsetMax = Math.floor(rhythmState.rhythmSteps / 2);
                    rhythmState.rhythmOffset = Math.max(-rhythmOffsetMax, Math.min(rhythmOffsetMax, rhythmState.rhythmOffset));

                    updateInternalRhythms();
                    UI.updateRhythmDisplays(rhythmState); // Update UI after internal update
                     // Reset indices if arp not running
                    if (!State.get('isRunning')) {
                        State.resetIndices();
                    }
                },
                getPatternRhythm: () => rhythmState.patternRhythm,
                getRhythm: () => rhythmState.rhythm,
                getGateMultiplier: (index) => rhythmState.rhythmGateMultipliers[index % (rhythmState.rhythmGateMultipliers.length || 1)] ?? 1,
                 // Get specific event, respecting disabled state
                getPatternEventAt: (index) => {
                     if (rhythmState.isPatternDisabled || !rhythmState.patternRhythm || rhythmState.patternRhythm.length === 0) {
                        return Config.PATTERN_NOTE;
                    }
                    return rhythmState.patternRhythm[index % rhythmState.patternRhythm.length];
                },
                getRhythmEventAt: (index) => {
                    if (rhythmState.isRhythmDisabled || !rhythmState.rhythm || rhythmState.rhythm.length === 0) {
                        return Config.RHYTHM_BEAT;
                    }
                    return rhythmState.rhythm[index % rhythmState.rhythm.length];
                },
                // Get current event, respecting disabled state
                getCurrentPatternEvent: () => Rhythm.getPatternEventAt(State.get('currentPatternIndex')),
                getCurrentRhythmEvent: () => Rhythm.getRhythmEventAt(State.get('currentRhythmIndex')),
                getRhythmState: () => ({...rhythmState}) // For UI updates
            };
        })();

        // --- Clock Module ---
        const Clock = (() => {
            let clockState = {
                tempoSource: 'internal',
                bpm: 120,
                clockDivision: '1/4',
                ticksPerStep: 24, // Calculated from clockDivision
                tickCounter: -1,
                internalClockIntervalId: null,
                clockDivisionDurationMs: 0, // Estimated/calculated duration of a step
                tickHistory: [],
                tickIndex: 0,
            };

            const calculateTicksPerStep = (division) => {
                 switch (division) {
                    case '1/1': return Config.MIDI_TICKS_PER_QUARTER * 4;
                    case '1/2': return Config.MIDI_TICKS_PER_QUARTER * 2;
                    case '1/4': return Config.MIDI_TICKS_PER_QUARTER * 1;
                    case '1/8': return Config.MIDI_TICKS_PER_QUARTER / 2;
                    case '1/16': return Config.MIDI_TICKS_PER_QUARTER / 4;
                    case '1/32': return Config.MIDI_TICKS_PER_QUARTER / 8;
                    case '1/2T': return (Config.MIDI_TICKS_PER_QUARTER * 2) * (2 / 3); // Triplet based on 1/2
                    case '1/4T': return (Config.MIDI_TICKS_PER_QUARTER * 1) * (2 / 3); // Triplet based on 1/4
                    case '1/8T': return (Config.MIDI_TICKS_PER_QUARTER / 2) * (2 / 3); // Triplet based on 1/8
                    case '1/16T': return (Config.MIDI_TICKS_PER_QUARTER / 4) * (2 / 3); // Triplet based on 1/16
                    case '1/32T': return (Config.MIDI_TICKS_PER_QUARTER / 8) * (2 / 3); // Triplet based on 1/32
                    default: return Config.MIDI_TICKS_PER_QUARTER; // Default to 1/4
                }
            };

            const updateClockSettings = () => {
                clockState.ticksPerStep = Math.round(calculateTicksPerStep(clockState.clockDivision)); // Round triplet results
                if (clockState.ticksPerStep < 1) clockState.ticksPerStep = 1; // Minimum 1 tick

                if (clockState.tempoSource === 'internal') {
                    stopInternalClock(); // Clear existing before starting new
                    startInternalClock();
                } else {
                    stopInternalClock(); // Stop internal if switching to external
                    // Reset external clock estimation state
                    clockState.tickHistory = new Array(Config.MIDI_CLOCK_TICK_HISTORY_SIZE).fill(performance.now());
                    clockState.tickIndex = Config.MIDI_CLOCK_TICK_HISTORY_SIZE; // Start ready for avg calculation
                     // Estimate duration based on current BPM if known, otherwise 0
                     if (clockState.bpm > 0) {
                         const avgInterval = 60000 / (clockState.bpm * Config.MIDI_TICKS_PER_QUARTER);
                         clockState.clockDivisionDurationMs = avgInterval * clockState.ticksPerStep;
                     } else {
                         clockState.clockDivisionDurationMs = 0;
                     }
                }
                UI.updateTempoDisplay(clockState.tempoSource, clockState.bpm);
            };

            const startInternalClock = () => {
                if (clockState.internalClockIntervalId !== null) return; // Already running
                if (clockState.bpm <= 0) clockState.bpm = 1;
                const ticksPerSecond = (clockState.bpm / 60) * Config.MIDI_TICKS_PER_QUARTER;
                const intervalMs = 1000 / ticksPerSecond;
                clockState.internalClockIntervalId = setInterval(internalTick, intervalMs);
                clockState.clockDivisionDurationMs = intervalMs * clockState.ticksPerStep;
                 // console.log(`Internal clock started: BPM=${clockState.bpm}, Interval=${intervalMs.toFixed(2)}ms, Ticks/Step=${clockState.ticksPerStep}, Step Duration=${clockState.clockDivisionDurationMs.toFixed(2)}ms`);
            };

            const stopInternalClock = () => {
                if (clockState.internalClockIntervalId !== null) {
                    clearInterval(clockState.internalClockIntervalId);
                    clockState.internalClockIntervalId = null;
                     // console.log("Internal clock stopped.");
                }
            };

            // Internal clock tick source
            const internalTick = () => {
                 if (!State.get('isRunning')) return; // Only tick if arp is running
                handleTick();
            };

            // Generic tick handler (called by internal or external MIDI tick)
            const handleTick = () => {
                 clockState.tickCounter++;
                 if (clockState.tickCounter >= 0 && (clockState.tickCounter % clockState.ticksPerStep === 0)) {
                     Main.arpStep(); // Call the main arp step function
                 }
            };

            // External MIDI clock tick handler
            const handleMidiTick = () => {
                 if (clockState.tempoSource !== 'external') return; // Ignore if not in external mode

                 const now = performance.now();
                 // Shift history
                 for (let i = 0; i < Config.MIDI_CLOCK_TICK_HISTORY_SIZE - 1; i++) {
                    clockState.tickHistory[i] = clockState.tickHistory[i + 1];
                 }
                 clockState.tickHistory[Config.MIDI_CLOCK_TICK_HISTORY_SIZE - 1] = now;
                 clockState.tickIndex++;

                 let calculatedBPM = clockState.bpm; // Keep last known if calculation fails
                 let averageInterval = 0;

                 if (clockState.tickIndex >= Config.MIDI_CLOCK_TICK_HISTORY_SIZE) { // Enough history for average
                     const firstTickTime = clockState.tickHistory[0];
                     const lastTickTime = clockState.tickHistory[Config.MIDI_CLOCK_TICK_HISTORY_SIZE - 1];
                     const totalDuration = lastTickTime - firstTickTime;
                     averageInterval = totalDuration / (Config.MIDI_CLOCK_TICK_HISTORY_SIZE - 1);
                 } else if (clockState.tickIndex > 1) { // Initial ticks, use direct interval
                      averageInterval = clockState.tickHistory[clockState.tickIndex - 1] - clockState.tickHistory[clockState.tickIndex - 2];
                 }

                 if (averageInterval > 0) {
                     calculatedBPM = 60000 / (averageInterval * Config.MIDI_TICKS_PER_QUARTER);
                     // Apply smoothing/rounding if desired (simple rounding here)
                     clockState.bpm = Math.round(calculatedBPM);
                     // Update estimated duration based on average interval for stability
                     clockState.clockDivisionDurationMs = averageInterval * clockState.ticksPerStep;
                     UI.updateTempoDisplay(clockState.tempoSource, clockState.bpm);
                 }

                 // Process the arp step based on this external tick
                 if (State.get('isRunning')) {
                     handleTick();
                 }
            };

            return {
                init: () => {
                     updateClockSettings(); // Calculate initial ticksPerStep etc.
                     clockState.tickCounter = -1; // Initialize counter
                },
                setTempoSource: (source) => {
                    if (source !== clockState.tempoSource) {
                        clockState.tempoSource = source;
                        clockState.tickCounter = -1; // Reset counter on source change
                        updateClockSettings();
                    }
                },
                setBPM: (newBpm) => {
                    newBpm = parseInt(newBpm) || 120;
                    newBpm = Math.max(10, Math.min(300, newBpm)); // Clamp
                    if (newBpm !== clockState.bpm) {
                        clockState.bpm = newBpm;
                        if (clockState.tempoSource === 'internal') {
                            updateClockSettings(); // Restart internal clock with new BPM
                        }
                         UI.updateTempoDisplay(clockState.tempoSource, clockState.bpm);
                    }
                },
                setClockDivision: (division) => {
                    if (division !== clockState.clockDivision) {
                        clockState.clockDivision = division;
                        updateClockSettings(); // Recalculate ticks and potentially restart internal clock
                    }
                },
                start: () => {
                     clockState.tickCounter = -1; // Reset tick counter on start
                    if (clockState.tempoSource === 'internal') {
                        startInternalClock();
                    }
                    // External clock relies on incoming MIDI ticks
                },
                stop: () => {
                    stopInternalClock();
                },
                resetTickCounter: () => { clockState.tickCounter = -1; },
                getClockDivisionDurationMs: () => clockState.clockDivisionDurationMs,
                handleMidiTick: handleMidiTick,
                // --- Getters added ---
                getTempoSource: () => clockState.tempoSource,
                getBPM: () => clockState.bpm,
                getClockDivision: () => clockState.clockDivision
            };
        })();

        // --- MIDI Handler Module ---
        const Midi = (() => {
            let midiAccess = null;
            let inputDevice = null;
            let outputDevice = null;
            let midiState = {
                 isMPEEnabled: false,
                 mpeGlobalInputChannel: 'omni', // 'omni' or 1-16
                 mpeInputVoiceChannels: 8,     // 1-15
                 mpeOutputMode: 'non-mpe',     // 'non-mpe' or 'mpe'
                 mpeGlobalOutputChannel: 1,    // 1-16 (used as base for non-mpe too)
                 mpeChannelNotes: new Array(16).fill(null), // Tracks note currently playing on each MPE channel
                 // --- Derived state ---
                 mpeGlobalInputChannelNum: -1, // Numeric version (-1 for omni)
                 mpeGlobalOutputChannelNum: 0, // Numeric version (0-15)
            };

            const updateMidiSettings = (settings) => {
                midiState = { ...midiState, ...settings };
                // Convert channel strings to numbers where appropriate for comparison
                midiState.mpeGlobalInputChannelNum = midiState.mpeGlobalInputChannel === 'omni' ? -1 : parseInt(midiState.mpeGlobalInputChannel) - 1;
                midiState.mpeGlobalOutputChannelNum = parseInt(midiState.mpeGlobalOutputChannel) - 1;
                // Ensure voice channels don't overlap global output channel in MPE mode
                // (A more robust check might be needed depending on exact MPE spec interpretation)
            };

            // --- MIDI Message Parsing Helpers ---
            const handleNoteOn = (channel, note, velocity) => {
                 if (velocity > 0) {
                     Midi.assignMpeChannelNote(channel, note); // Track MPE note assignment
                     const added = State.addHeldNote(note, 'midi');
                     if (added) {
                         State.get('notePressures').set(note, velocity); // Initial pressure = velocity
                     } else {
                         // If note already held (e.g., by UI), still update pressure
                         if(State.get('heldNotesMIDI').has(note) || State.get('heldNotesUI').has(note)){
                             State.get('notePressures').set(note, velocity);
                         }
                     }
                     UI.updatePianoKey(note);
                     if (added) {
                         handleNoteChange(note, null); // Signal note added
                     }
                 } else {
                     // Note On with velocity 0 is Note Off
                     handleNoteOff(channel, note, 0);
                 }
            };
            const handleNoteOff = (channel, note, velocity) => {
                 const removed = State.removeHeldNote(note, 'midi');
                 UI.updatePianoKey(note);
                 if (removed) {
                     handleNoteChange(null, note); // Signal note removed
                 }
                 Midi.clearMpeChannel(channel, note); // Clear MPE tracking
            };
             const handlePolyAftertouch = (channel, note, pressure) => {
                const originalNote = State.getOriginalNote(note);
                if (originalNote !== null && State.get('notePressures').has(originalNote)) {
                    State.get('notePressures').set(originalNote, pressure);
                    // console.log(`Poly Pressure Ch ${channel+1}, Note ${originalNote}, Pressure ${pressure}`);
                 }
             };
             const handleChannelPressure = (channel, pressure) => {
                if (midiState.isMPEEnabled) {
                    // Apply to note associated with this MPE channel
                    const note = midiState.mpeChannelNotes[channel];
                    if (note !== null) {
                         const originalNote = State.getOriginalNote(note);
                        if (originalNote !== null && State.get('notePressures').has(originalNote)) {
                             State.get('notePressures').set(originalNote, pressure);
                             // console.log(`MPE Pressure Ch ${channel+1}, Note ${originalNote}, Pressure ${pressure}`);
                         }
                    }
                } else {
                     // Non-MPE: Apply to all MIDI-held notes if on the base channel
                     if(channel === midiState.mpeGlobalOutputChannelNum) {
                         State.getRawHeldNotes().forEach(rawNote => {
                             if (State.get('heldNotesMIDI').has(rawNote) && State.get('notePressures').has(rawNote)) {
                                 State.get('notePressures').set(rawNote, pressure);
                             }
                         });
                         // console.log(`Channel Pressure Ch ${channel+1}, Pressure ${pressure}`);
                     }
                }
             };
             const handleControlChange = (channel, ccNumber, ccValue) => {
                // Sustain Pedal (Global)
                if (ccNumber === 64) {
                    if (ccValue >= 64) { // Pedal Down
                         if (!State.get('isSustainPedalPressed')) {
                             State.set('isSustainPedalPressed', true);
                             // console.log("Sustain ON");
                         }
                     } else { // Pedal Up
                         if (State.get('isSustainPedalPressed')) {
                             State.set('isSustainPedalPressed', false);
                             // console.log("Sustain OFF");
